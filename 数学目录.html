<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数学可视化工具目录</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#f7f6f2;--surface:#fff;--ink:#1a1814;--ink2:#6b6860;--ink3:#a8a69f;
      --border:#e4e2da;--blue:#2a5c8f;--blue-light:#e8f0f8;--blue-dark:#0c447c;
      --teal:#0f6e56;--teal-light:#e1f5ee;--amber:#854f0b;--amber-light:#faeeda;
      --red:#b84040;--radius:12px;--radius-sm:8px;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{height:100%;overflow:hidden;}
    body{background:var(--bg);font-family:'Noto Sans SC',sans-serif;color:var(--ink);display:flex;flex-direction:column;}
    /* ── Header ── */
    header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 20px;flex-shrink:0;z-index:100;}
    .header-inner{display:flex;flex-direction:column;gap:10px;}
    .title-row{display:flex;align-items:baseline;gap:12px;}
    h1{font-size:20px;font-weight:700;}
    .count-badge{background:var(--blue);color:#fff;border-radius:20px;padding:3px 10px;font-size:13px;font-family:'JetBrains Mono',monospace;}
    .search-row{display:flex;gap:8px;flex-wrap:wrap;}
    .search-box{flex:1;min-width:160px;padding:7px 12px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-family:inherit;outline:none;transition:border-color .2s;}
    .search-box:focus{border-color:var(--blue);}
    .filter-row{display:flex;gap:5px;flex-wrap:wrap;}
    .filter-btn{padding:4px 10px;border:2px solid var(--border);border-radius:20px;font-size:11px;font-family:inherit;cursor:pointer;background:var(--surface);color:var(--ink2);transition:all .2s;white-space:nowrap;}
    .filter-btn.active{color:#fff;border-color:transparent;}
    .filter-btn[data-group="grade"].active{background:var(--blue);}
    .filter-btn[data-group="diff"].active{background:var(--teal);}
    .filter-btn[data-group="cogn"].active{background:var(--amber);}
    .filter-btn[data-group="prio"].active{background:var(--red);}
    /* ── Workspace ── */
    .workspace{flex:1;display:flex;overflow:hidden;min-height:0;}
    /* ── Card panel ── */
    .card-panel{width:400px;min-width:240px;flex-shrink:0;overflow-y:auto;border-right:1px solid var(--border);display:flex;flex-direction:column;}
    .sort-row{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--border);flex-wrap:wrap;flex-shrink:0;background:var(--surface);}
    .sort-lbl{font-size:12px;color:var(--ink2);}
    .sort-btn{padding:4px 10px;border:2px solid var(--border);border-radius:20px;font-size:11px;font-family:inherit;cursor:pointer;background:var(--surface);color:var(--ink2);transition:all .2s;}
    .sort-btn.active{background:var(--ink);color:#fff;border-color:var(--ink);}
    .results-info{font-size:11px;color:var(--ink3);margin-left:auto;}
    .grid{padding:10px 12px;display:grid;grid-template-columns:1fr;gap:10px;flex:1;}
    .card{background:var(--surface);border:2px solid var(--border);border-radius:var(--radius-sm);display:flex;flex-direction:column;cursor:pointer;transition:border-color .15s,box-shadow .15s;position:relative;overflow:hidden;}
    .card:hover{border-color:#b8cfe8;box-shadow:0 2px 10px rgba(42,92,143,.1);}
    .card.selected{border-color:var(--blue);}
    /* thumbnail */
    .thumb{width:100%;height:150px;overflow:hidden;position:relative;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0;}
    .thumb iframe{width:800px;height:520px;border:none;transform-origin:top left;transform:scale(var(--ts,0.44));pointer-events:none;position:absolute;top:0;left:0;}
    .thumb-ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--ink3);background:var(--bg);}
    /* card body */
    .card-body{padding:10px 12px;display:flex;flex-direction:column;gap:5px;}
    .card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;}
    .card-title{font-size:13px;font-weight:700;line-height:1.4;flex:1;}
    .card-actions{display:flex;align-items:center;gap:4px;flex-shrink:0;}
    .card-prio{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:700;}
    .prio-A{background:var(--amber-light);color:var(--amber);}
    .prio-B{background:var(--blue-light);color:var(--blue);}
    .prio-C{background:#f0f0f0;color:var(--ink2);}
    .card-open-btn{font-size:13px;color:var(--ink3);text-decoration:none;line-height:1;padding:2px 4px;border-radius:4px;transition:color .15s,background .15s;}
    .card-open-btn:hover{color:var(--blue);background:var(--blue-light);}
    .card-desc{font-size:11px;color:var(--ink2);line-height:1.55;}
    .card-tags{display:flex;gap:4px;flex-wrap:wrap;}
    .tag{font-size:10px;padding:2px 7px;border-radius:10px;}
    .tag-grade-大学{background:#f3e8ff;color:#7b3f9e;}
    .tag-grade-高中{background:var(--teal-light);color:var(--teal);}
    .tag-grade-初中{background:var(--blue-light);color:var(--blue);}
    .tag-grade-小学{background:#fff8e0;color:#a07000;}
    .tag-topic{background:var(--bg);color:var(--ink2);border:1px solid var(--border);}
    .tag-diff-高{background:#fee;color:var(--red);}
    .tag-diff-中{background:var(--amber-light);color:var(--amber);}
    .tag-diff-低{background:var(--teal-light);color:var(--teal);}
    .tag-cogn{background:#f0f0f0;color:var(--ink2);}
    .no-results{text-align:center;padding:40px 16px;color:var(--ink2);font-size:14px;}
    .section-header{font-size:13px;font-weight:700;color:var(--ink2);margin:10px 0 4px;padding-bottom:4px;border-bottom:2px solid var(--border);}
    /* ── Preview panel ── */
    .preview-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;background:#f0ede8;}
    .preview-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--ink3);user-select:none;}
    .preview-empty-icon{font-size:48px;opacity:.35;}
    .preview-empty-text{font-size:14px;}
    .preview-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;min-height:52px;}
    .preview-bar-title{font-size:14px;font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .preview-bar-tags{display:flex;gap:4px;flex-shrink:0;}
    .preview-new-tab{font-size:12px;color:var(--blue);text-decoration:none;padding:5px 12px;border:1px solid var(--blue);border-radius:20px;white-space:nowrap;transition:background .15s;}
    .preview-new-tab:hover{background:var(--blue-light);}
    .preview-frame-wrap{flex:1;position:relative;overflow:hidden;}
    .preview-frame-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:none;}
    .preview-loader{position:absolute;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--ink2);transition:opacity .3s;}
    .preview-loader.hidden{opacity:0;pointer-events:none;}
    /* ── Mobile modal ── */
    .preview-modal{display:none;position:fixed;inset:0;z-index:200;flex-direction:column;background:var(--surface);}
    .preview-modal.open{display:flex;}
    .modal-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0;}
    .modal-title{font-size:14px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .modal-close{font-size:20px;background:none;border:none;cursor:pointer;color:var(--ink2);line-height:1;padding:2px 6px;}
    .modal-open{font-size:12px;color:var(--blue);text-decoration:none;padding:5px 12px;border:1px solid var(--blue);border-radius:20px;}
    .modal-frame{flex:1;border:none;width:100%;}
    /* ── View toggle buttons ── */
    .view-toggle{display:flex;gap:4px;margin-left:auto;}
    .view-btn{display:flex;align-items:center;gap:5px;padding:5px 12px;border:2px solid var(--border);border-radius:20px;font-size:12px;font-family:inherit;cursor:pointer;background:var(--surface);color:var(--ink2);transition:all .2s;white-space:nowrap;}
    .view-btn.active{background:var(--ink);color:#fff;border-color:var(--ink);}
    /* ── Grid mode ── */
    body.view-grid .card-panel{width:100%;border-right:none;}
    body.view-grid .preview-panel{display:none!important;}
    body.view-grid .grid{grid-template-columns:repeat(auto-fill,minmax(240px,1fr));padding:16px 20px;gap:14px;}
    body.view-grid .thumb{height:175px;}
    body.view-grid .sort-row{max-width:none;}
    /* ── Responsive ── */
    @media(max-width:720px){
      .preview-panel{display:none!important;}
      .card-panel{width:100%;border-right:none;}
    }
    @media(min-width:721px){
      .preview-modal{display:none!important;}
    }
  </style>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="title-row">
      <h1>📐 数学可视化工具目录</h1>
      <span class="count-badge" id="countBadge">127个工具</span>
    </div>
    <div class="search-row">
      <input class="search-box" id="searchInput" type="text" placeholder="搜索工具名称、描述或知识点...">
    </div>
    <div class="filter-row">
      <span style="font-size:11px;color:var(--ink2);margin-right:2px">学段：</span>
      <button class="filter-btn active" data-group="grade" data-value="">全部</button>
      <button class="filter-btn" data-group="grade" data-value="小学">小学</button>
      <button class="filter-btn" data-group="grade" data-value="初中">初中</button>
      <button class="filter-btn" data-group="grade" data-value="高中">高中</button>
      <button class="filter-btn" data-group="grade" data-value="大学">大学</button>
    </div>
    <div class="filter-row">
      <span style="font-size:11px;color:var(--ink2);margin-right:2px">认知：</span>
      <button class="filter-btn active" data-group="cogn" data-value="">全部</button>
      <button class="filter-btn" data-group="cogn" data-value="变换">变换</button>
      <button class="filter-btn" data-group="cogn" data-value="比较">比较</button>
      <button class="filter-btn" data-group="cogn" data-value="分解">分解</button>
      <button class="filter-btn" data-group="cogn" data-value="逼近">逼近</button>
      <button class="filter-btn" data-group="cogn" data-value="累积">累积</button>
      <button class="filter-btn" data-group="cogn" data-value="缩放">缩放</button>
      <button class="filter-btn" data-group="cogn" data-value="投影">投影</button>
      <button class="filter-btn" data-group="cogn" data-value="模拟">模拟</button>
      <span style="font-size:11px;color:var(--ink2);margin-left:8px;margin-right:2px">难度：</span>
      <button class="filter-btn active" data-group="diff" data-value="">全部</button>
      <button class="filter-btn" data-group="diff" data-value="低">低</button>
      <button class="filter-btn" data-group="diff" data-value="中">中</button>
      <button class="filter-btn" data-group="diff" data-value="高">高</button>
    </div>
  </div>
</header>

<div class="workspace">
  <!-- Left: card list -->
  <div class="card-panel">
    <div class="sort-row">
      <span class="sort-lbl">排序：</span>
      <button class="sort-btn active" data-sort="grade">学段</button>
      <button class="sort-btn" data-sort="prio">优先级</button>
      <button class="sort-btn" data-sort="cogn">认知</button>
      <button class="sort-btn" data-sort="name">名称</button>
      <span class="results-info" id="resultsInfo"></span>
      <div class="view-toggle">
        <button class="view-btn active" data-view="grid" onclick="setView('grid')" title="网格视图">⊞ 网格</button>
        <button class="view-btn" data-view="sidebar" onclick="setView('sidebar')" title="侧栏视图">▤ 侧栏</button>
      </div>
    </div>
    <div class="grid" id="grid"></div>
    <div class="no-results" id="noResults" style="display:none">没有找到匹配的工具，试试清除筛选条件。</div>
  </div>

  <!-- Right: preview pane -->
  <div class="preview-panel" id="previewPanel">
    <div class="preview-empty" id="previewEmpty">
      <div class="preview-empty-icon">🔍</div>
      <div class="preview-empty-text">点击左侧工具卡片预览</div>
    </div>
    <div id="previewActive" style="display:none;flex:1;flex-direction:column;overflow:hidden;">
      <div class="preview-bar" id="previewBar">
        <span class="preview-bar-title" id="previewTitle"></span>
        <div class="preview-bar-tags" id="previewTags"></div>
        <a class="preview-new-tab" id="previewNewTab" href="#" target="_blank">↗ 新标签打开</a>
      </div>
      <div class="preview-frame-wrap">
        <div class="preview-loader" id="previewLoader">加载中…</div>
        <iframe id="previewFrame" src="" allowfullscreen></iframe>
      </div>
    </div>
  </div>
</div>

<!-- Mobile modal -->
<div class="preview-modal" id="previewModal">
  <div class="modal-bar">
    <span class="modal-title" id="modalTitle"></span>
    <a class="modal-open" id="modalNewTab" href="#" target="_blank">↗</a>
    <button class="modal-close" onclick="closeModal()">✕</button>
  </div>
  <iframe class="modal-frame" id="modalFrame" src="" allowfullscreen></iframe>
</div>

const GRADE_ORDER = {'小学':0,'初中':1,'高中':2,'大学':3};
const COGN_ORDER = {'变换':0,'比较':1,'分解':2,'逼近':3,'累积':4,'缩放':5,'投影':6,'模拟':7};
const DIFF_ORDER = {'低':0,'中':1,'高':2};

let filters = {grade:'', diff:'', cogn:''};
let sortBy = 'grade';
let searchQuery = '';
let activeFile = null;
let viewMode = 'grid'; // 'grid' | 'sidebar'

function setView(mode){
  viewMode = mode;
  document.body.classList.toggle('view-grid', mode === 'grid');
  document.querySelectorAll('.view-btn').forEach(b=>b.classList.toggle('active', b.dataset.view === mode));
  if(mode === 'grid'){ activeFile = null; }
  render();
}

function openPreview(t){
  if(viewMode === 'grid'){
    window.open(t.file, '_blank');
    return;
  }
  activeFile = t.file;
  const isMobile = window.innerWidth <= 720;
  if(isMobile){
    document.getElementById('modalTitle').textContent = t.title;
    document.getElementById('modalNewTab').href = t.file;
    document.getElementById('modalFrame').src = t.file;
    document.getElementById('previewModal').classList.add('open');
  } else {
    document.getElementById('previewTitle').textContent = t.title;
    document.getElementById('previewNewTab').href = t.file;
    const tagsEl = document.getElementById('previewTags');
    tagsEl.innerHTML = `<span class="tag tag-grade-${t.grade}" style="font-size:10px;padding:2px 7px;border-radius:10px;">${t.grade}</span>
      <span class="tag tag-diff-${t.diff}" style="font-size:10px;padding:2px 7px;border-radius:10px;">难度${t.diff}</span>`;
    const loader = document.getElementById('previewLoader');
    const frame = document.getElementById('previewFrame');
    loader.classList.remove('hidden');
    frame.onload = ()=>{ loader.classList.add('hidden'); };
    frame.src = t.file;
    document.getElementById('previewEmpty').style.display = 'none';
    document.getElementById('previewActive').style.display = 'flex';
  }
  render();
}

function closeModal(){
  document.getElementById('previewModal').classList.remove('open');
  document.getElementById('modalFrame').src = '';
}

// Default to grid view on load
document.body.classList.add('view-grid');

function render(){
  let items = TOOLS.filter(t=>{
    if(filters.grade && t.grade !== filters.grade) return false;
    if(filters.diff && t.diff !== filters.diff) return false;
    if(filters.cogn && t.cogn !== filters.cogn) return false;
    if(searchQuery){
      const q = searchQuery.toLowerCase();
      if(!t.title.toLowerCase().includes(q) && !t.desc.toLowerCase().includes(q) && !t.topic.toLowerCase().includes(q)) return false;
    }
    return true;
  });

  // Sort
  if(sortBy === 'grade'){
    items.sort((a,b)=>(GRADE_ORDER[a.grade]||0)-(GRADE_ORDER[b.grade]||0) || a.title.localeCompare(b.title,'zh'));
  } else if(sortBy === 'prio'){
    items.sort((a,b)=>a.prio.localeCompare(b.prio)||a.title.localeCompare(b.title,'zh'));
  } else if(sortBy === 'cogn'){
    items.sort((a,b)=>(COGN_ORDER[a.cogn]||9)-(COGN_ORDER[b.cogn]||9)||a.title.localeCompare(b.title,'zh'));
  } else {
    items.sort((a,b)=>a.title.localeCompare(b.title,'zh'));
  }

  const grid = document.getElementById('grid');
  const noRes = document.getElementById('noResults');
  const info = document.getElementById('resultsInfo');
  info.textContent = `显示 ${items.length} / ${TOOLS.length} 个工具`;
  document.getElementById('countBadge').textContent = TOOLS.length + '个工具';

  if(items.length === 0){
    grid.innerHTML = '';
    noRes.style.display = 'block';
    return;
  }
  noRes.style.display = 'none';

  // Group by section if sorting by grade or cogn
  let html = '';
  let lastGroup = null;

  items.forEach(t=>{
    let group = sortBy==='grade'?t.grade : sortBy==='cogn'?t.cogn : null;
    if(group && group !== lastGroup){
      lastGroup = group;
      const groupLabel = sortBy==='grade' ? `${group}（${items.filter(x=>x.grade===group).length}个）` : `认知：${group}`;
      html += `<div><div class="section-header">${groupLabel}</div></div>`;
    }
    const diffClass = `tag-diff-${t.diff}`;
    const gradeClass = `tag-grade-${t.grade}`;
    const isSelected = t.file === activeFile;
    html += `
      <div class="card${isSelected?' selected':''}" data-file="${t.file}" onclick="openPreview(${JSON.stringify(t).replace(/"/g,'&quot;')})">
        <div class="thumb">
          <div class="thumb-ph">加载预览…</div>
          <iframe data-src="${t.file}" scrolling="no" tabindex="-1"></iframe>
        </div>
        <div class="card-body">
          <div class="card-header">
            <div class="card-title">${t.title}</div>
            <div class="card-actions">
              <span class="card-prio prio-${t.prio}">优先${t.prio}</span>
              <a class="card-open-btn" href="${t.file}" target="_blank" onclick="event.stopPropagation()" title="新标签打开">↗</a>
            </div>
          </div>
          <div class="card-desc">${t.desc}</div>
          <div class="card-tags">
            <span class="tag ${gradeClass}">${t.grade}</span>
            <span class="tag tag-topic">${t.topic}</span>
            <span class="tag ${diffClass}">难度${t.diff}</span>
            <span class="tag tag-cogn">🧠${t.cogn}</span>
          </div>
        </div>
      </div>`;
  });
  grid.innerHTML = html;
  requestAnimationFrame(()=>{ updateThumbScales(); initThumbObserver(); });
}

// ── Thumbnail lazy-load + scale ──
let thumbObserver = null;

function updateThumbScales(){
  document.querySelectorAll('.thumb').forEach(t=>{
    const scale = (t.offsetWidth / 800).toFixed(4);
    t.style.setProperty('--ts', scale);
  });
}

function initThumbObserver(){
  if(thumbObserver) thumbObserver.disconnect();
  thumbObserver = new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(!e.isIntersecting) return;
      const iframe = e.target;
      if(iframe.dataset.src){
        iframe.src = iframe.dataset.src;
        delete iframe.dataset.src;
        iframe.onload = ()=>{
          const ph = iframe.previousElementSibling;
          if(ph && ph.classList.contains('thumb-ph')) ph.style.display='none';
        };
      }
      thumbObserver.unobserve(iframe);
    });
  },{rootMargin:'400px'});
  document.querySelectorAll('.thumb iframe[data-src]').forEach(f=>thumbObserver.observe(f));
}

window.addEventListener('resize', updateThumbScales);

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const group = btn.dataset.group;
    const value = btn.dataset.value;
    document.querySelectorAll(`.filter-btn[data-group="${group}"]`).forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    filters[group] = value;
    render();
  });
});

// Sort buttons
document.querySelectorAll('.sort-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    sortBy = btn.dataset.sort;
    render();
  });
});

// Search
document.getElementById('searchInput').addEventListener('input',e=>{
  searchQuery = e.target.value.trim();
  render();
});

render();
requestAnimationFrame(()=>{ updateThumbScales(); initThumbObserver(); });
</script>
