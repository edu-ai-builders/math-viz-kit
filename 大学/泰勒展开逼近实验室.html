<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>泰勒展开逼近实验室 · 数学可视化</title>
  <meta name="grade" content="大学">
  <meta name="topic" content="级数">
  <meta name="difficulty" content="高">
  <meta name="priority" content="A">
  <meta name="cognitive" content="逼近">
  <meta name="desc" content="阶数滑杆动态增加多项式项，观察泰勒多项式如何逐步逼近原函数">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#f7f6f2;--surface:#fff;--ink:#1a1814;--ink2:#6b6860;--ink3:#a8a69f;--border:#e4e2da;--blue:#2a5c8f;--blue-light:#e8f0f8;--blue-dark:#0c447c;--teal:#0f6e56;--teal-light:#e1f5ee;--amber:#854f0b;--amber-light:#faeeda;--radius:12px;--radius-sm:8px;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);font-family:'Noto Sans SC',sans-serif;color:var(--ink);min-height:100vh;display:flex;flex-direction:column;align-items:center;}
    header{width:100%;max-width:760px;padding:24px 24px 0;}
    .badge{font-size:12px;color:var(--ink2);background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:4px 12px;display:inline-block;margin-bottom:8px;}
    h1{font-size:22px;font-weight:700;}
    .sub{font-size:13px;color:var(--ink2);margin-top:4px;}
    main{width:100%;max-width:760px;padding:16px 24px 32px;display:flex;flex-direction:column;gap:12px;}
    .stat-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
    .stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px;text-align:center;}
    .stat-lbl{font-size:11px;color:var(--ink2);}
    .stat-val{font-size:20px;font-weight:700;font-family:'JetBrains Mono',monospace;}
    canvas{width:100%;display:block;border-radius:var(--radius);background:var(--surface);border:1px solid var(--border);}
    .controls{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:grid;grid-template-columns:1fr 1fr;gap:14px;}
    .sl-row{display:flex;flex-direction:column;gap:4px;}
    .sl-lbl{font-size:13px;color:var(--ink2);}
    .sl-val{font-size:22px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--blue);}
    input[type=range]{accent-color:var(--blue);cursor:pointer;width:100%;}
    .fn-row{display:flex;gap:6px;flex-wrap:wrap;}
    .fn-btn{padding:6px 14px;border:2px solid var(--border);border-radius:20px;font-size:13px;font-family:'JetBrains Mono',monospace;background:var(--surface);cursor:pointer;transition:all .2s;}
    .fn-btn.active,.fn-btn:hover{background:var(--blue);color:#fff;border-color:var(--blue);}
    .terms-display{background:var(--blue-light);border-radius:var(--radius-sm);padding:10px 14px;font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--blue);overflow-x:auto;white-space:nowrap;}
    .fb{background:var(--teal-light);border-left:4px solid var(--teal);border-radius:var(--radius-sm);padding:12px 16px;font-size:14px;line-height:1.7;}
    @media(max-width:500px){.controls{grid-template-columns:1fr;}}
  </style>
</head>
<body>
<header>
  <div class="badge">大学 · 级数 · 认知动作：逼近</div>
  <h1>泰勒展开逼近实验室</h1>
  <p class="sub">增加多项式阶数，看曲线如何一步步"认识"原函数——泰勒级数的直觉</p>
</header>
<main>
  <div class="stat-row">
    <div class="stat"><div class="stat-lbl">展开阶数 n</div><div class="stat-val" id="nVal" style="color:var(--blue)">2</div></div>
    <div class="stat"><div class="stat-lbl">x=1处误差</div><div class="stat-val" id="errVal" style="color:var(--amber)">—</div></div>
    <div class="stat"><div class="stat-lbl">展开点 x₀</div><div class="stat-val" id="x0Val" style="color:var(--teal)">0</div></div>
  </div>
  <canvas id="cvs"></canvas>
  <div class="controls">
    <div class="sl-row">
      <div class="sl-lbl">展开阶数 n</div>
      <div class="sl-val" id="nLabel">2</div>
      <input type="range" id="nSl" min="0" max="15" value="2">
    </div>
    <div class="sl-row">
      <div class="sl-lbl">展开点 x₀</div>
      <div class="sl-val" id="x0Label">0</div>
      <input type="range" id="x0Sl" min="-2" max="2" step="0.5" value="0">
    </div>
  </div>
  <div>
    <div style="font-size:13px;color:var(--ink2);margin-bottom:6px;">被展开函数：</div>
    <div class="fn-row">
      <button class="fn-btn active" onclick="setFn(0,this)">sin(x)</button>
      <button class="fn-btn" onclick="setFn(1,this)">cos(x)</button>
      <button class="fn-btn" onclick="setFn(2,this)">eˣ</button>
      <button class="fn-btn" onclick="setFn(3,this)">ln(1+x)</button>
    </div>
  </div>
  <div class="terms-display" id="termsDisplay"></div>
  <div class="fb" id="fb"></div>
</main>
<script>
// PEDAGOGY V1 动态跃迁: 阶数增加时曲线的逼近过程只有动态才能理解
// PEDAGOGY V3 分步揭示: 从n=0开始，每增一阶揭示一个新项
// PEDAGOGY V5 操作先于符号: 先看逼近，再看公式展开
// PEDAGOGY V7 单一认知动作: 逼近
// PEDAGOGY V8 概念反馈: 揭示每项的贡献和余项的意义

const cvs = document.getElementById('cvs');
const ctx = cvs.getContext('2d');
const H = 360;

const C = {
  blue:'#2a5c8f', blueL:'#e8f0f8', teal:'#0f6e56', tealL:'#e1f5ee',
  amber:'#854f0b', amberL:'#faeeda', amberD:'#c47a0e', red:'#b84040',
  ink:'#1a1814', ink2:'#6b6860', ink3:'#a8a69f', border:'#e4e2da', surf:'#fff'
};

// Taylor coefficients computed analytically
// f(x) = sum_{k=0}^{n} f^(k)(x0)/k! * (x-x0)^k

// Derivatives at x0 for each function
const FNS = [
  {
    name:'sin(x)', fn: x=>Math.sin(x),
    // Taylor at x0: derivatives cycle sin,cos,-sin,-cos
    coeff: (k, x0) => {
      const cycle = [Math.sin(x0), Math.cos(x0), -Math.sin(x0), -Math.cos(x0)];
      return cycle[((k%4)+4)%4] / factorial(k);
    }
  },
  {
    name:'cos(x)', fn: x=>Math.cos(x),
    coeff: (k, x0) => {
      const cycle = [Math.cos(x0), -Math.sin(x0), -Math.cos(x0), Math.sin(x0)];
      return cycle[((k%4)+4)%4] / factorial(k);
    }
  },
  {
    name:'eˣ', fn: x=>Math.exp(x),
    coeff: (k, x0) => Math.exp(x0) / factorial(k)
  },
  {
    name:'ln(1+x)', fn: x=>Math.log(1+x),
    coeff: (k, x0) => {
      if(k===0) return Math.log(1+x0);
      // k-th derivative of ln(1+x) = (-1)^(k+1) * (k-1)! / (1+x)^k
      const d = Math.pow(-1,k+1) * factorial(k-1) / Math.pow(1+x0, k);
      return d / factorial(k);
    }
  }
];

let fnIdx = 0;

function factorial(n){ return n<=1?1:n*factorial(n-1); }

function setup(){
  const r = cvs.getBoundingClientRect(), dpr = window.devicePixelRatio||1;
  cvs.width = r.width*dpr; cvs.height = H*dpr; ctx.scale(dpr,dpr); cvs.style.height = H+'px';
}

function setFn(idx, btn){
  fnIdx = idx;
  document.querySelectorAll('.fn-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  draw();
}

function taylorAt(x, n, x0){
  let sum = 0;
  for(let k=0;k<=n;k++){
    const c = FNS[fnIdx].coeff(k, x0);
    if(!isFinite(c)) continue;
    sum += c * Math.pow(x-x0, k);
  }
  return sum;
}

function draw(){
  const W = cvs.getBoundingClientRect().width;
  ctx.clearRect(0,0,W,H);
  const n = parseInt(document.getElementById('nSl').value);
  const x0 = parseFloat(document.getElementById('x0Sl').value);
  const margin = {left:44, right:16, top:16, bottom:40};
  const plotW = W-margin.left-margin.right;
  const plotH = H-margin.top-margin.bottom;
  const xRange = 4, yRange = 2.5;
  const xToP = x => margin.left + (x+xRange)/(2*xRange)*plotW;
  const yToP = y => margin.top + (yRange-y)/(2*yRange)*plotH;

  // Grid
  ctx.strokeStyle = C.border; ctx.lineWidth=0.5;
  for(let i=-xRange;i<=xRange;i++){ctx.beginPath();ctx.moveTo(xToP(i),margin.top);ctx.lineTo(xToP(i),margin.top+plotH);ctx.stroke();}
  for(let i=-Math.ceil(yRange);i<=Math.ceil(yRange);i++){ctx.beginPath();ctx.moveTo(margin.left,yToP(i));ctx.lineTo(margin.left+plotW,yToP(i));ctx.stroke();}

  // Axes
  ctx.strokeStyle=C.ink2; ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(margin.left,yToP(0));ctx.lineTo(margin.left+plotW,yToP(0));ctx.stroke();
  ctx.beginPath();ctx.moveTo(xToP(0),margin.top);ctx.lineTo(xToP(0),margin.top+plotH);ctx.stroke();

  ctx.fillStyle=C.ink3; ctx.font=`10px 'JetBrains Mono',monospace`; ctx.textAlign='center'; ctx.textBaseline='top';
  for(let i=-xRange;i<=xRange;i++){if(i!==0)ctx.fillText(String(i),xToP(i),yToP(0)+3);}
  ctx.textAlign='right'; ctx.textBaseline='middle';
  for(let i=-2;i<=2;i++){if(i!==0)ctx.fillText(String(i),margin.left-3,yToP(i));}

  // True function
  const f = FNS[fnIdx].fn;
  ctx.strokeStyle=C.ink; ctx.lineWidth=2.5; ctx.setLineDash([]);
  ctx.beginPath(); let first=true;
  for(let px=0;px<=plotW;px+=2){
    const x = (px/plotW)*(2*xRange)-xRange;
    const y = f(x);
    if(!isFinite(y)||Math.abs(y)>20){first=true;continue;}
    const py = yToP(y);
    first?(ctx.moveTo(margin.left+px,py),first=false):ctx.lineTo(margin.left+px,py);
  }
  ctx.stroke();

  // Taylor polynomial — color gradient by order
  const t = n/15; // 0→1
  const col = `rgb(${Math.round(42+t*(11-42))},${Math.round(92+t*(110-92))},${Math.round(143+t*(86-143))})`;
  ctx.strokeStyle = C.amber; ctx.lineWidth = 2.5; ctx.setLineDash([5,3]);
  ctx.beginPath(); first=true;
  for(let px=0;px<=plotW;px+=2){
    const x = (px/plotW)*(2*xRange)-xRange;
    const y = taylorAt(x, n, x0);
    if(!isFinite(y)||Math.abs(y)>20){first=true;continue;}
    const py = yToP(y);
    first?(ctx.moveTo(margin.left+px,py),first=false):ctx.lineTo(margin.left+px,py);
  }
  ctx.stroke(); ctx.setLineDash([]);

  // x0 marker
  ctx.strokeStyle=C.teal; ctx.lineWidth=1.5; ctx.setLineDash([4,3]);
  ctx.beginPath(); ctx.moveTo(xToP(x0),margin.top); ctx.lineTo(xToP(x0),margin.top+plotH); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle=C.teal; ctx.beginPath(); ctx.arc(xToP(x0),yToP(f(x0)),5,0,Math.PI*2); ctx.fill();

  // Legend
  ctx.fillStyle=C.ink; ctx.font=`bold 13px 'JetBrains Mono',monospace`; ctx.textAlign='left'; ctx.textBaseline='top';
  ctx.fillText(FNS[fnIdx].name, margin.left+4, margin.top+4);
  ctx.fillStyle=C.amber;
  ctx.fillText(`T${n}(x) — 第${n}阶泰勒多项式`, margin.left+4, margin.top+20);

  // Update stats
  const err = Math.abs(f(1) - taylorAt(1, n, x0));
  document.getElementById('nVal').textContent = n;
  document.getElementById('nLabel').textContent = n;
  document.getElementById('x0Val').textContent = x0.toFixed(1);
  document.getElementById('x0Label').textContent = x0.toFixed(1);
  document.getElementById('errVal').textContent = err < 0.0001 ? '<0.0001' : err.toFixed(4);

  // Terms display
  const termsArr = [];
  for(let k=0;k<=Math.min(n,6);k++){
    const c = FNS[fnIdx].coeff(k, x0);
    if(!isFinite(c)) continue;
    const cf = c.toFixed(3).replace(/\.?0+$/,'');
    if(k===0) termsArr.push(cf);
    else if(k===1) termsArr.push(`${cf}(x${x0!==0?'-'+x0:''})`);
    else termsArr.push(`${cf}(x${x0!==0?'-'+x0:''})^${k}`);
  }
  if(n>6) termsArr.push('...');
  document.getElementById('termsDisplay').textContent = `T${n}(x) = ` + termsArr.join(' + ').replace(/\+ -/g,'- ');

  // PEDAGOGY V8
  document.getElementById('fb').innerHTML =
    `第 ${n} 阶泰勒多项式包含 ${n+1} 项。<strong>阶数越高，逼近范围越广，误差越小。</strong><br>` +
    `泰勒展开的本质：用多项式来"模仿"一个函数，每增加一项，就在展开点附近多"捕获"一层信息（导数值）。<br>` +
    `x=1处近似误差：<strong>${err<0.0001?'<0.0001':err.toFixed(6)}</strong>`;
}

document.getElementById('nSl').addEventListener('input', draw);
document.getElementById('x0Sl').addEventListener('input', draw);
window.addEventListener('resize',()=>{ setup(); draw(); });
setup(); draw();
</script>
</body>
</html>
