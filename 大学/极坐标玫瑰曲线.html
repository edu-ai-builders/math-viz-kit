<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>极坐标与玫瑰曲线 · 数学可视化</title>
  <meta name="grade" content="大学">
  <meta name="topic" content="极坐标">
  <meta name="difficulty" content="中">
  <meta name="priority" content="B">
  <meta name="cognitive" content="变换">
  <meta name="desc" content="极坐标参数实时调整，玫瑰曲线/螺线等优美曲线动画绘制，理解极坐标与直角坐标的联系">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#f7f6f2;--surface:#fff;--ink:#1a1814;--ink2:#6b6860;--ink3:#a8a69f;--border:#e4e2da;--blue:#2a5c8f;--blue-light:#e8f0f8;--teal:#0f6e56;--teal-light:#e1f5ee;--amber:#854f0b;--amber-light:#faeeda;--radius:12px;--radius-sm:8px;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);font-family:'Noto Sans SC',sans-serif;color:var(--ink);min-height:100vh;display:flex;flex-direction:column;align-items:center;}
    header{width:100%;max-width:760px;padding:24px 24px 0;}
    .badge{font-size:12px;color:var(--ink2);background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:4px 12px;display:inline-block;margin-bottom:8px;}
    h1{font-size:22px;font-weight:700;}
    .sub{font-size:13px;color:var(--ink2);margin-top:4px;}
    main{width:100%;max-width:760px;padding:16px 24px 32px;display:flex;flex-direction:column;gap:12px;}
    canvas{width:100%;display:block;border-radius:var(--radius);background:var(--surface);border:1px solid var(--border);}
    .controls{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    .sl-row{display:flex;flex-direction:column;gap:4px;}
    .sl-lbl{font-size:13px;color:var(--ink2);}
    .sl-val{font-size:22px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--blue);}
    input[type=range]{accent-color:var(--blue);cursor:pointer;width:100%;}
    .curve-row{display:flex;gap:6px;flex-wrap:wrap;}
    .cv-btn{padding:7px 14px;border:2px solid var(--border);border-radius:20px;font-size:13px;font-family:inherit;cursor:pointer;background:var(--surface);transition:all .2s;}
    .cv-btn.active,.cv-btn:hover{background:var(--blue);color:#fff;border-color:var(--blue);}
    .fb{background:var(--teal-light);border-left:4px solid var(--teal);border-radius:var(--radius-sm);padding:12px 16px;font-size:14px;line-height:1.7;}
  </style>
</head>
<body>
<header>
  <div class="badge">大学 · 极坐标 · 认知动作：变换</div>
  <h1>极坐标与玫瑰曲线</h1>
  <p class="sub">r = f(θ)：在极坐标中，美丽的曲线只需一个简单方程</p>
</header>
<main>
  <div class="curve-row">
    <button class="cv-btn active" onclick="setCurve(0,this)">玫瑰曲线 r=cos(nθ)</button>
    <button class="cv-btn" onclick="setCurve(1,this)">阿基米德螺线</button>
    <button class="cv-btn" onclick="setCurve(2,this)">心形线 r=1+cos(θ)</button>
    <button class="cv-btn" onclick="setCurve(3,this)">双纽线 r²=cos(2θ)</button>
  </div>
  <canvas id="cvs"></canvas>
  <div class="controls">
    <div class="sl-row">
      <div class="sl-lbl">参数 n（花瓣数控制）</div>
      <div class="sl-val" id="nLabel">3</div>
      <input type="range" id="nSl" min="1" max="8" step="1" value="3">
    </div>
    <div class="sl-row">
      <div class="sl-lbl">缩放 a</div>
      <div class="sl-val" id="aLabel" style="color:var(--teal)">1.0</div>
      <input type="range" id="aSl" min="0.5" max="3" step="0.1" value="1.0">
    </div>
  </div>
  <div class="fb" id="fb"></div>
</main>
<script>
// PEDAGOGY V1 动态跃迁: 极坐标曲线的形成过程只有动画才能展示
// PEDAGOGY V3 分步揭示: 动画从θ=0开始逐步绘制曲线
// PEDAGOGY V5 操作先于符号: 先看美丽的曲线，再理解r=f(θ)
// PEDAGOGY V7 单一认知动作: 变换（极→直角坐标变换）
// PEDAGOGY V8 概念反馈: 揭示r(θ)的几何意义

const cvs=document.getElementById('cvs');
const ctx=cvs.getContext('2d');
const H=380;
const C={
  blue:'#2a5c8f',blueL:'#e8f0f8',teal:'#0f6e56',tealL:'#e1f5ee',
  amber:'#854f0b',amberL:'#faeeda',
  ink:'#1a1814',ink2:'#6b6860',ink3:'#a8a69f',border:'#e4e2da',surf:'#fff'
};

const CURVES=[
  {name:'玫瑰曲线',formula:'r = a·cos(n·θ)',fn:(theta,n,a)=>a*Math.cos(n*theta),maxTheta:2*Math.PI},
  {name:'阿基米德螺线',formula:'r = a·θ/(2π)',fn:(theta,n,a)=>a*theta/(2*Math.PI),maxTheta:4*Math.PI},
  {name:'心形线',formula:'r = a·(1+cos(θ))',fn:(theta,n,a)=>a*(1+Math.cos(theta)),maxTheta:2*Math.PI},
  {name:'双纽线',formula:'r = √(a²·cos(2θ))（|cos|部分）',fn:(theta,n,a)=>{const v=a*a*Math.cos(2*theta);return v>=0?Math.sqrt(v):NaN;},maxTheta:2*Math.PI}
];

let curveIdx=0;
let animT=0,animFrame=null;

function setup(){
  const r=cvs.getBoundingClientRect(),dpr=window.devicePixelRatio||1;
  cvs.width=r.width*dpr;cvs.height=H*dpr;ctx.scale(dpr,dpr);cvs.style.height=H+'px';
}

function setCurve(idx,btn){
  curveIdx=idx;
  document.querySelectorAll('.cv-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  startAnim();
}

function startAnim(){
  if(animFrame){cancelAnimationFrame(animFrame);animFrame=null;}
  animT=0;
  const startTime=performance.now();
  const duration=1500;
  function animate(now){
    animT=Math.min((now-startTime)/duration,1);
    draw(animT);
    if(animT<1) animFrame=requestAnimationFrame(animate);
    else { animFrame=null; draw(1); }
  }
  animFrame=requestAnimationFrame(animate);
}

function draw(t){
  const W=cvs.getBoundingClientRect().width;
  ctx.clearRect(0,0,W,H);
  const n=parseInt(document.getElementById('nSl').value);
  const a=parseFloat(document.getElementById('aSl').value);
  const curve=CURVES[curveIdx];
  const cx=W/2,cy=H/2;
  const scale=Math.min(W,H)*0.35/Math.max(a,1);

  // Polar grid
  ctx.strokeStyle=C.border;ctx.lineWidth=0.5;
  for(let r=1;r<=4;r++){
    ctx.beginPath();ctx.arc(cx,cy,r*scale*a/Math.max(a,1)*a,0,Math.PI*2);ctx.stroke();
  }
  for(let ang=0;ang<Math.PI*2;ang+=Math.PI/6){
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+200*Math.cos(ang),cy+200*Math.sin(ang));ctx.stroke();
  }

  // Axes
  ctx.strokeStyle=C.ink2;ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(0,cy);ctx.lineTo(W,cy);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx,0);ctx.lineTo(cx,H);ctx.stroke();

  // Draw curve up to t*maxTheta
  const maxTheta=curve.maxTheta;
  const steps=800;
  const thetaEnd=t*maxTheta;
  const colors=['#2a5c8f','#0f6e56','#854f0b','#7b3f9e'];
  ctx.strokeStyle=colors[curveIdx];ctx.lineWidth=2.5;ctx.setLineDash([]);
  ctx.beginPath();let first=true;
  for(let i=0;i<=steps*t;i++){
    const theta=(i/steps)*maxTheta;
    if(theta>thetaEnd) break;
    const r=curve.fn(theta,n,a);
    if(isNaN(r)||!isFinite(r)){first=true;continue;}
    const px=cx+r*scale*Math.cos(theta);
    const py=cy+r*scale*Math.sin(theta);
    first?(ctx.moveTo(px,py),first=false):ctx.lineTo(px,py);
  }
  ctx.stroke();

  // Current point indicator
  if(t<1){
    const thetaCur=t*maxTheta;
    const rCur=curve.fn(thetaCur,n,a);
    if(!isNaN(rCur)&&isFinite(rCur)){
      const px=cx+rCur*scale*Math.cos(thetaCur);
      const py=cy+rCur*scale*Math.sin(thetaCur);
      // Radius line
      ctx.strokeStyle=C.amber+'88';ctx.lineWidth=1.5;ctx.setLineDash([4,3]);
      ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(px,py);ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle=C.amber;ctx.beginPath();ctx.arc(px,py,7,0,Math.PI*2);ctx.fill();
    }
  }

  // Formula
  ctx.fillStyle=colors[curveIdx];ctx.font=`bold 14px 'JetBrains Mono',monospace`;ctx.textAlign='left';ctx.textBaseline='top';
  ctx.fillText(curve.formula.replace('n',n).replace('a',a.toFixed(1)),10,8);

  // Update display
  document.getElementById('nLabel').textContent=n;
  document.getElementById('aLabel').textContent=a.toFixed(1);

  // PEDAGOGY V8
  const fb=document.getElementById('fb');
  const msgs={
    0:`玫瑰曲线 r = ${a.toFixed(1)}·cos(${n}θ)：n=${n} 时有 ${n%2===0?2*n:n} 片花瓣。<strong>极坐标</strong>中 r 表示到原点的距离，θ 表示角度。当 r = cos(nθ) 时，随 θ 旋转，r 周期变化，形成花瓣！`,
    1:`阿基米德螺线 r = aθ：r 随 θ 线性增大，即离原点的距离随角度匀速增大。θ 每增加 2π（一圈），r 增大 <strong>${(a*2*Math.PI).toFixed(2)}</strong>。`,
    2:`心形线 r = a(1+cosθ)：当 θ=0 时 r=2a（最大），θ=π 时 r=0（回到原点）。两点间距离公式使它形成"心形"。`,
    3:`双纽线 r² = a²cos(2θ)：只有 cos(2θ)≥0 时才有实数解，形成两个椭圆状叶片。n=2 的极坐标方程！`
  };
  fb.innerHTML=msgs[curveIdx];
}

document.getElementById('nSl').addEventListener('input',()=>startAnim());
document.getElementById('aSl').addEventListener('input',()=>startAnim());
window.addEventListener('resize',()=>{setup();startAnim();});
setup();startAnim();
</script>
</body>
</html>
