<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>初值问题解曲线实验室 · 数学可视化</title>
  <meta name="grade" content="大学">
  <meta name="topic" content="常微分方程">
  <meta name="difficulty" content="高">
  <meta name="priority" content="B">
  <meta name="cognitive" content="变换">
  <meta name="desc" content="点击设置初始条件，从方向场自动绘制积分曲线，直观理解初值问题的解族和初始条件的影响">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#f7f6f2;--surface:#fff;--ink:#1a1814;--ink2:#6b6860;--border:#e4e2da;--blue:#2a5c8f;--blue-light:#e8f0f8;--teal:#0f6e56;--teal-light:#e1f5ee;--amber:#854f0b;--amber-light:#faeeda;--radius:12px;--radius-sm:8px;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);font-family:'Noto Sans SC',sans-serif;color:var(--ink);min-height:100vh;display:flex;flex-direction:column;align-items:center;}
    header{width:100%;max-width:720px;padding:24px 20px 0;}
    .badge{font-size:12px;color:var(--ink2);background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:4px 12px;display:inline-block;margin-bottom:8px;}
    h1{font-size:22px;font-weight:700;}
    .sub{font-size:13px;color:var(--ink2);margin-top:4px;}
    main{width:100%;max-width:720px;padding:14px 20px 32px;display:flex;flex-direction:column;gap:10px;}
    .eq-row{display:flex;gap:6px;flex-wrap:wrap;}
    .eq-btn{padding:6px 12px;border:2px solid var(--border);border-radius:20px;font-size:12px;cursor:pointer;background:var(--surface);font-family:'JetBrains Mono',monospace;}
    .eq-btn.active{background:var(--blue);color:#fff;border-color:var(--blue);}
    .hint-bar{background:var(--blue-light);border-radius:var(--radius-sm);padding:6px 12px;font-size:12px;color:var(--blue);}
    canvas{width:100%;display:block;border-radius:var(--radius);background:var(--surface);border:1px solid var(--border);cursor:crosshair;}
    .btn-row{display:flex;gap:8px;}
    .btn{padding:7px 16px;border:none;border-radius:var(--radius-sm);cursor:pointer;font-size:12px;font-family:'Noto Sans SC',sans-serif;font-weight:700;}
    .btn-primary{background:var(--blue);color:#fff;}
    .btn-secondary{background:var(--surface);border:2px solid var(--border);color:var(--ink2);}
    .fb{background:var(--teal-light);border-left:4px solid var(--teal);border-radius:var(--radius-sm);padding:12px 16px;font-size:13px;line-height:1.7;}
  </style>
</head>
<body>
<header>
  <div class="badge">大学 · 常微分方程 · 认知动作：变换</div>
  <h1>初值问题解曲线实验室</h1>
  <p class="sub">点击画布设置初始条件，自动绘制积分曲线</p>
</header>
<main>
  <div class="eq-row">
    <button class="eq-btn active" onclick="setEq('linear',this)">y'=y</button>
    <button class="eq-btn" onclick="setEq('logistic',this)">y'=y(1-y)</button>
    <button class="eq-btn" onclick="setEq('oscillator',this)">y'=-x/y</button>
    <button class="eq-btn" onclick="setEq('vdp',this)">y'=x²-y</button>
    <button class="eq-btn" onclick="setEq('nonlinear',this)">y'=sin(x+y)</button>
  </div>
  <div class="hint-bar">在画布上点击设置初始点 (x₀,y₀)，自动绘制该初值问题的解曲线</div>
  <canvas id="cvs"></canvas>
  <div class="btn-row">
    <button class="btn btn-secondary" onclick="clearCurves()">清除曲线</button>
    <button class="btn btn-secondary" onclick="addMultiple()">自动添加多条</button>
  </div>
  <div class="fb" id="fb"></div>
</main>
<script>
// PEDAGOGY V5 操作先于符号: 先点击感受"从不同起点得到不同曲线"
// PEDAGOGY V6 动作—数学一致: 点击坐标 = 初始条件 (x₀, y₀)
// PEDAGOGY V8 概念反馈: 解释解族的概念和初值对解的影响

const cvs=document.getElementById('cvs');
const ctx=cvs.getContext('2d');
const H=340;
const xRange=[-3,3],yRange=[-3,3];
let eq='linear';
let curves=[];
const COLORS=['#2a5c8f','#0f6e56','#854f0b','#b84040','#7b3f9e','#c06000','#1a5cb5','#d97706','#059669','#dc2626'];

const EQS={
  linear:{f:(x,y)=>y,label:"y' = y",desc:'指数增长/衰减，初值正则增长，负则衰减。解为 y=Ce^x，C由初值确定。'},
  logistic:{f:(x,y)=>y*(1-y),label:"y' = y(1-y)",desc:'Logistic方程，y=0和y=1是平衡解。初值在(0,1)间则S形增长至1，初值>1则下降到1。'},
  oscillator:{f:(x,y)=>Math.abs(y)<0.01?0:-x/y,label:"y' = -x/y",desc:'圆形等高线方程，积分曲线是同心圆（x²+y²=C）。'},
  vdp:{f:(x,y)=>x*x-y,label:"y' = x²-y",desc:'线性非齐次ODE，积分因子解。解趋向特解 y=x²-2x+2（注意曲线如何汇聚）。'},
  nonlinear:{f:(x,y)=>Math.sin(x+y),label:"y' = sin(x+y)",desc:'非线性ODE，无解析解，数值方法求解。注意复杂的流场结构。'},
};

function setup(){
  const r=cvs.getBoundingClientRect(),dpr=window.devicePixelRatio||1;
  cvs.width=r.width*dpr;cvs.height=H*dpr;
  ctx.scale(dpr,dpr);cvs.style.height=H+'px';
}

function toX(x){const W=cvs.getBoundingClientRect().width;const pad={l:40,r:15};return pad.l+(x-xRange[0])/(xRange[1]-xRange[0])*(W-pad.l-pad.r);}
function toY(y){const pad={t:15,b:30};return pad.t+(H-pad.t-pad.b)*(1-(y-yRange[0])/(yRange[1]-yRange[0]));}
function fromCanvas(px,py){
  const r=cvs.getBoundingClientRect();const W=r.width;
  const pad={l:40,r:15,t:15,b:30};const cw=W-pad.l-pad.r,ch=H-pad.t-pad.b;
  return [xRange[0]+(px-pad.l)/cw*(xRange[1]-xRange[0]),yRange[0]+(1-(py-pad.t)/ch)*(yRange[1]-yRange[0])];
}

function integrateCurve(x0,y0,fwd=true){
  const pts=[[x0,y0]];
  let x=x0,y=y0;
  const dt=fwd?0.04:-0.04;
  const steps=120;
  for(let i=0;i<steps;i++){
    const f=EQS[eq].f(x,y);
    if(!isFinite(f)||Math.abs(f)>50) break;
    // RK4
    const k1=EQS[eq].f(x,y);
    const k2=EQS[eq].f(x+dt/2,y+dt/2*k1);
    const k3=EQS[eq].f(x+dt/2,y+dt/2*k2);
    const k4=EQS[eq].f(x+dt,y+dt*k3);
    y+=dt/6*(k1+2*k2+2*k3+k4);
    x+=dt;
    if(!isFinite(y)||y<yRange[0]-0.5||y>yRange[1]+0.5) break;
    pts.push([x,y]);
  }
  return pts;
}

function addCurve(x0,y0){
  const fwd=integrateCurve(x0,y0,true);
  const bwd=integrateCurve(x0,y0,false).slice(1);
  const full=[...bwd.reverse(),...fwd];
  const col=COLORS[curves.length%COLORS.length];
  curves.push({pts:full,x0,y0,col});
  draw();
}

function clearCurves(){curves=[];draw();}

function addMultiple(){
  clearCurves();
  for(let y=-2.5;y<=2.5;y+=1){
    addCurve(-2.5,y);
  }
  for(let y=-2;y<=2;y+=0.8){
    addCurve(0,y);
  }
}

function setEq(e,btn){
  eq=e;
  document.querySelectorAll('.eq-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  curves=[];
  draw();
  document.getElementById('fb').innerHTML=`<strong>${EQS[e].label}</strong>：${EQS[e].desc}<br>在画布上点击任意位置，从该点出发绘制解曲线。每条曲线代表一个初值问题 y(x₀)=y₀ 的解。`;
}

function draw(){
  const r=cvs.getBoundingClientRect();const W=r.width;
  ctx.clearRect(0,0,W,H);
  const pad={l:40,r:15,t:15,b:30};
  const cw=W-pad.l-pad.r,ch=H-pad.t-pad.b;

  // Direction field
  const gn=18;
  for(let i=0;i<=gn;i++) for(let j=0;j<=gn;j++){
    const x=xRange[0]+i/gn*(xRange[1]-xRange[0]);
    const y=yRange[0]+j/gn*(yRange[1]-yRange[0]);
    const f=EQS[eq].f(x,y);
    if(!isFinite(f)) continue;
    const ang=Math.atan(f);
    const len=8;
    const dx=Math.cos(ang)*len,dy=Math.sin(ang)*len;
    const px=toX(x),py=toY(y);
    const speed=Math.min(1,Math.abs(f)/3);
    ctx.strokeStyle=`rgba(168,166,159,${0.3+speed*0.3})`;ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(px-dx/2,py+dy/2);ctx.lineTo(px+dx/2,py-dy/2);ctx.stroke();
    // Arrowhead
    ctx.fillStyle=`rgba(168,166,159,${0.4+speed*0.3})`;ctx.beginPath();
    const ha=4;const arAng=Math.atan2(-dy,dx);
    ctx.moveTo(px+dx/2,py-dy/2);
    ctx.lineTo(px+dx/2-ha*Math.cos(arAng-0.4),py-dy/2+ha*Math.sin(arAng-0.4));
    ctx.lineTo(px+dx/2-ha*Math.cos(arAng+0.4),py-dy/2+ha*Math.sin(arAng+0.4));
    ctx.closePath();ctx.fill();
  }

  // Axes
  ctx.strokeStyle='#6b6860';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(pad.l,toY(0));ctx.lineTo(W-pad.r,toY(0));ctx.stroke();
  ctx.beginPath();ctx.moveTo(toX(0),pad.t);ctx.lineTo(toX(0),pad.t+ch);ctx.stroke();
  ctx.fillStyle='#a8a69f';ctx.font=`9px 'JetBrains Mono',monospace`;
  for(let x=xRange[0];x<=xRange[1];x++){if(x===0)continue;ctx.textAlign='center';ctx.textBaseline='top';ctx.fillText(x,toX(x),toY(0)+3);}
  for(let y=yRange[0];y<=yRange[1];y++){if(y===0)continue;ctx.textAlign='right';ctx.textBaseline='middle';ctx.fillText(y,toX(0)-3,toY(y));}

  // Solution curves
  curves.forEach(({pts,x0,y0,col})=>{
    ctx.strokeStyle=col;ctx.lineWidth=2.5;
    ctx.beginPath();let first=true;
    pts.forEach(([x,y])=>{
      const px=toX(x),py=toY(y);
      if(first){ctx.moveTo(px,py);first=false;}
      else ctx.lineTo(px,py);
    });
    ctx.stroke();
    // Initial point
    ctx.fillStyle=col;ctx.beginPath();ctx.arc(toX(x0),toY(y0),5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(toX(x0),toY(y0),2.5,0,Math.PI*2);ctx.fill();
  });

  // Equation label
  ctx.fillStyle='#2a5c8f';ctx.font=`bold 12px 'JetBrains Mono',monospace`;
  ctx.textAlign='left';ctx.textBaseline='top';
  ctx.fillText(EQS[eq].label,pad.l+4,pad.t+2);
}

cvs.addEventListener('click',e=>{
  const r=cvs.getBoundingClientRect();
  const [x0,y0]=fromCanvas(e.clientX-r.left,e.clientY-r.top);
  if(x0<xRange[0]||x0>xRange[1]||y0<yRange[0]||y0>yRange[1]) return;
  addCurve(x0,y0);
});

window.addEventListener('resize',()=>{setup();draw();});
setup();
setEq('linear',document.querySelector('.eq-btn'));
addMultiple();
</script>
</body>
</html>
