<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>正态分布面积概率工具 · 数学可视化</title>
  <meta name="grade" content="大学">
  <meta name="topic" content="概率统计">
  <meta name="difficulty" content="低">
  <meta name="priority" content="A">
  <meta name="cognitive" content="累积">
  <meta name="desc" content="正态分布N(μ,σ²)的阴影面积即概率，调整μ/σ和区间实时计算P(a≤X≤b)">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#f7f6f2;--surface:#fff;--ink:#1a1814;--ink2:#6b6860;--ink3:#a8a69f;--border:#e4e2da;--blue:#2a5c8f;--blue-light:#e8f0f8;--teal:#0f6e56;--teal-light:#e1f5ee;--amber:#854f0b;--amber-light:#faeeda;--radius:12px;--radius-sm:8px;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);font-family:'Noto Sans SC',sans-serif;color:var(--ink);min-height:100vh;display:flex;flex-direction:column;align-items:center;}
    header{width:100%;max-width:760px;padding:24px 24px 0;}
    .badge{font-size:12px;color:var(--ink2);background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:4px 12px;display:inline-block;margin-bottom:8px;}
    h1{font-size:22px;font-weight:700;}
    .sub{font-size:13px;color:var(--ink2);margin-top:4px;}
    main{width:100%;max-width:760px;padding:16px 24px 32px;display:flex;flex-direction:column;gap:12px;}
    .stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
    .stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px;text-align:center;}
    .stat-lbl{font-size:11px;color:var(--ink2);}
    .stat-val{font-size:20px;font-weight:700;font-family:'JetBrains Mono',monospace;}
    canvas{width:100%;display:block;border-radius:var(--radius);background:var(--surface);border:1px solid var(--border);}
    .controls{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:grid;grid-template-columns:1fr 1fr;gap:14px;}
    .sl-row{display:flex;flex-direction:column;gap:4px;}
    .sl-lbl{font-size:13px;color:var(--ink2);}
    .sl-val{font-size:20px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--blue);}
    input[type=range]{accent-color:var(--blue);cursor:pointer;width:100%;}
    .mode-row{display:flex;gap:6px;flex-wrap:wrap;}
    .mode-btn{flex:1;min-width:140px;padding:9px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:12px;font-family:inherit;cursor:pointer;background:var(--surface);transition:all .2s;}
    .mode-btn.active{background:var(--blue);color:#fff;border-color:var(--blue);}
    .fb{background:var(--teal-light);border-left:4px solid var(--teal);border-radius:var(--radius-sm);padding:12px 16px;font-size:14px;line-height:1.7;}
  </style>
</head>
<body>
<header>
  <div class="badge">大学 · 概率统计 · 认知动作：累积</div>
  <h1>正态分布面积概率工具</h1>
  <p class="sub">阴影面积 = 概率——调整参数和区间，读取 P(a ≤ X ≤ b)</p>
</header>
<main>
  <div class="mode-row">
    <button class="mode-btn active" onclick="setMode('custom',this)">自定义区间</button>
    <button class="mode-btn" onclick="setMode('1sigma',this)">μ±σ（约68%）</button>
    <button class="mode-btn" onclick="setMode('2sigma',this)">μ±2σ（约95%）</button>
    <button class="mode-btn" onclick="setMode('3sigma',this)">μ±3σ（约99.7%）</button>
  </div>
  <div class="stat-row">
    <div class="stat"><div class="stat-lbl">概率 P(a≤X≤b)</div><div class="stat-val" id="probVal" style="color:var(--blue)">—</div></div>
    <div class="stat"><div class="stat-lbl">z-score 下</div><div class="stat-val" id="za" style="color:var(--teal)">—</div></div>
    <div class="stat"><div class="stat-lbl">z-score 上</div><div class="stat-val" id="zb" style="color:var(--amber)">—</div></div>
  </div>
  <canvas id="cvs"></canvas>
  <div class="controls">
    <div class="sl-row">
      <div class="sl-lbl">均值 μ</div>
      <div class="sl-val" id="muLabel">0.0</div>
      <input type="range" id="muSl" min="-3" max="3" step="0.5" value="0">
    </div>
    <div class="sl-row">
      <div class="sl-lbl">标准差 σ</div>
      <div class="sl-val" id="sigLabel">1.0</div>
      <input type="range" id="sigSl" min="0.5" max="3" step="0.5" value="1">
    </div>
    <div class="sl-row">
      <div class="sl-lbl">区间下界 a</div>
      <div class="sl-val" id="aLabel" style="color:var(--teal)">-1.0</div>
      <input type="range" id="aSl" min="-6" max="6" step="0.5" value="-1">
    </div>
    <div class="sl-row">
      <div class="sl-lbl">区间上界 b</div>
      <div class="sl-val" id="bLabel" style="color:var(--amber)">1.0</div>
      <input type="range" id="bSl" min="-6" max="6" step="0.5" value="1">
    </div>
  </div>
  <div class="fb" id="fb"></div>
</main>
<script>
// PEDAGOGY V1 动态跃迁: 概率即面积只有阴影图才能直观
// PEDAGOGY V2 表征桥接: 图像 ↔ z值 ↔ 概率数值
// PEDAGOGY V4 信号聚焦: 蓝=分布曲线，青=下界，橙=上界，阴影=概率
// PEDAGOGY V7 单一认知动作: 累积（面积累积=概率）
// PEDAGOGY V8 概念反馈: 揭示68-95-99.7法则

const cvs=document.getElementById('cvs');
const ctx=cvs.getContext('2d');
const H=300;
const C={
  blue:'#2a5c8f',blueL:'#e8f0f8',teal:'#0f6e56',tealL:'#e1f5ee',
  amber:'#854f0b',amberD:'#c47a0e',amberL:'#faeeda',
  ink:'#1a1814',ink2:'#6b6860',ink3:'#a8a69f',border:'#e4e2da',surf:'#fff'
};

let mode='custom';

// Normal PDF
function pdf(x,mu,sig){return Math.exp(-0.5*((x-mu)/sig)**2)/(sig*Math.sqrt(2*Math.PI));}

// Numerical CDF via Simpson
function cdf(x,mu,sig){
  const z=(x-mu)/sig;
  // Use complementary error function approximation
  return 0.5*(1+erf(z/Math.sqrt(2)));
}

function erf(x){
  const t=1/(1+0.3275911*Math.abs(x));
  const poly=t*(0.254829592+t*(-0.284496736+t*(1.421413741+t*(-1.453152027+t*1.061405429))));
  const r=1-poly*Math.exp(-x*x);
  return x>=0?r:-r;
}

function setup(){
  const r=cvs.getBoundingClientRect(),dpr=window.devicePixelRatio||1;
  cvs.width=r.width*dpr;cvs.height=H*dpr;ctx.scale(dpr,dpr);cvs.style.height=H+'px';
}

function setMode(m,btn){
  mode=m;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const mu=parseFloat(document.getElementById('muSl').value);
  const sig=parseFloat(document.getElementById('sigSl').value);
  if(m==='1sigma'){document.getElementById('aSl').value=mu-sig;document.getElementById('bSl').value=mu+sig;}
  else if(m==='2sigma'){document.getElementById('aSl').value=mu-2*sig;document.getElementById('bSl').value=mu+2*sig;}
  else if(m==='3sigma'){document.getElementById('aSl').value=mu-3*sig;document.getElementById('bSl').value=mu+3*sig;}
  draw();
}

function draw(){
  const W=cvs.getBoundingClientRect().width;
  ctx.clearRect(0,0,W,H);
  const mu=parseFloat(document.getElementById('muSl').value);
  const sig=parseFloat(document.getElementById('sigSl').value);
  let a=parseFloat(document.getElementById('aSl').value);
  let b=parseFloat(document.getElementById('bSl').value);
  if(a>b){const tmp=a;a=b;b=tmp;}

  const margin={left:44,right:20,top:16,bottom:40};
  const plotW=W-margin.left-margin.right;
  const plotH=H-margin.top-margin.bottom;
  const xRange=[-6,6]; // display range
  const yMax=pdf(mu,mu,sig)*1.15;
  const xToP=x=>margin.left+(x-xRange[0])/(xRange[1]-xRange[0])*plotW;
  const yToP=y=>margin.top+(1-y/yMax)*plotH;

  // Grid
  ctx.strokeStyle=C.border;ctx.lineWidth=0.5;
  for(let i=-6;i<=6;i++){
    ctx.beginPath();ctx.moveTo(xToP(i),margin.top);ctx.lineTo(xToP(i),margin.top+plotH);ctx.stroke();
  }

  // Fill shaded area
  ctx.fillStyle=C.blue+'44';
  ctx.beginPath();
  ctx.moveTo(xToP(a),yToP(0));
  for(let px=0;px<=plotW;px+=2){
    const x=xRange[0]+(px/plotW)*(xRange[1]-xRange[0]);
    if(x<a||x>b) continue;
    ctx.lineTo(xToP(x),yToP(pdf(x,mu,sig)));
  }
  ctx.lineTo(xToP(b),yToP(0));
  ctx.closePath();ctx.fill();

  // Curve
  ctx.strokeStyle=C.blue;ctx.lineWidth=2.5;ctx.setLineDash([]);
  ctx.beginPath();let first=true;
  for(let px=0;px<=plotW;px+=2){
    const x=xRange[0]+(px/plotW)*(xRange[1]-xRange[0]);
    const y=pdf(x,mu,sig);
    first?(ctx.moveTo(xToP(x),yToP(y)),first=false):ctx.lineTo(xToP(x),yToP(y));
  }
  ctx.stroke();

  // Axis
  ctx.strokeStyle=C.ink2;ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(margin.left,yToP(0));ctx.lineTo(margin.left+plotW,yToP(0));ctx.stroke();
  ctx.fillStyle=C.ink2;ctx.font=`11px 'JetBrains Mono',monospace`;ctx.textAlign='center';ctx.textBaseline='top';
  for(let i=-6;i<=6;i+=1) ctx.fillText(String(i),xToP(i),yToP(0)+3);

  // Vertical lines at a and b
  ctx.strokeStyle=C.teal;ctx.lineWidth=2;ctx.setLineDash([5,4]);
  ctx.beginPath();ctx.moveTo(xToP(a),margin.top);ctx.lineTo(xToP(a),yToP(0));ctx.stroke();
  ctx.strokeStyle=C.amberD;
  ctx.beginPath();ctx.moveTo(xToP(b),margin.top);ctx.lineTo(xToP(b),yToP(0));ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle=C.teal;ctx.font=`bold 12px 'JetBrains Mono',monospace`;ctx.textAlign='center';ctx.textBaseline='bottom';
  ctx.fillText(`a=${a}`,xToP(a),margin.top+plotH-4);
  ctx.fillStyle=C.amberD;ctx.fillText(`b=${b}`,xToP(b),margin.top+plotH-4);

  // mu marker
  ctx.strokeStyle=C.ink2;ctx.lineWidth=1.5;ctx.setLineDash([3,3]);
  ctx.beginPath();ctx.moveTo(xToP(mu),margin.top);ctx.lineTo(xToP(mu),yToP(0));ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle=C.ink2;ctx.font=`bold 12px 'JetBrains Mono',monospace`;ctx.textAlign='center';ctx.textBaseline='bottom';
  ctx.fillText(`μ=${mu}`,xToP(mu),margin.top+2);

  // σ annotation
  ctx.strokeStyle=C.ink3;ctx.lineWidth=1.5;
  const sigY=yToP(pdf(mu,mu,sig)*0.5);
  ctx.beginPath();ctx.moveTo(xToP(mu),sigY);ctx.lineTo(xToP(mu+sig),sigY);ctx.stroke();
  ctx.fillStyle=C.ink3;ctx.font=`11px 'JetBrains Mono',monospace`;ctx.textAlign='center';ctx.textBaseline='bottom';
  ctx.fillText(`σ=${sig}`,xToP(mu+sig/2),sigY-1);

  // Probability
  const prob=cdf(b,mu,sig)-cdf(a,mu,sig);
  const za=(a-mu)/sig,zb=(b-mu)/sig;

  // Prob label in shaded area
  if(prob>0.02){
    ctx.fillStyle=C.blue;ctx.font=`bold 18px 'JetBrains Mono',monospace`;ctx.textAlign='center';ctx.textBaseline='middle';
    const midX=(xToP(Math.max(a,xRange[0]))+xToP(Math.min(b,xRange[1])))/2;
    ctx.fillText(`${(prob*100).toFixed(1)}%`,midX,margin.top+plotH*0.35);
  }

  document.getElementById('probVal').textContent=(prob*100).toFixed(2)+'%';
  document.getElementById('za').textContent=za.toFixed(2);
  document.getElementById('zb').textContent=zb.toFixed(2);
  document.getElementById('muLabel').textContent=mu.toFixed(1);
  document.getElementById('sigLabel').textContent=sig.toFixed(1);
  document.getElementById('aLabel').textContent=a.toFixed(1);
  document.getElementById('bLabel').textContent=b.toFixed(1);

  // PEDAGOGY V8
  const rule68=Math.abs(a-(mu-sig))<0.1&&Math.abs(b-(mu+sig))<0.1;
  const rule95=Math.abs(a-(mu-2*sig))<0.1&&Math.abs(b-(mu+2*sig))<0.1;
  const rule997=Math.abs(a-(mu-3*sig))<0.1&&Math.abs(b-(mu+3*sig))<0.1;
  let ruleNote='';
  if(rule68) ruleNote='<strong>这是著名的68%法则：μ±σ区间覆盖68.3%的数据。</strong>';
  else if(rule95) ruleNote='<strong>这是95%法则：μ±2σ区间覆盖95.4%的数据。</strong>';
  else if(rule997) ruleNote='<strong>这是99.7%法则：μ±3σ区间覆盖99.7%的数据（几乎全部）。</strong>';
  document.getElementById('fb').innerHTML=
    `P(${a} ≤ X ≤ ${b}) = <strong>${(prob*100).toFixed(3)}%</strong>，即阴影面积占总面积的比例。<br>` +
    `z值：a对应 z=${za.toFixed(2)}，b对应 z=${zb.toFixed(2)}（距均值的标准差倍数）。<br>` +
    `N(μ=${mu}, σ²=${sig**2})：改变 σ 使曲线变宽/窄，改变 μ 使曲线左右平移，总面积恒为1。<br>` +
    (ruleNote||`调整区间至 μ±σ、μ±2σ、μ±3σ 查看著名的68-95-99.7法则。`);
}

['muSl','sigSl','aSl','bSl'].forEach(id=>document.getElementById(id).addEventListener('input',()=>{mode='custom';draw();}));
window.addEventListener('resize',()=>{setup();draw();});
setup();draw();
</script>
</body>
</html>
