<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>向量与线性组合实验室 · 数学可视化</title>
  <meta name="grade" content="大学">
  <meta name="topic" content="线性代数">
  <meta name="difficulty" content="中">
  <meta name="priority" content="A">
  <meta name="cognitive" content="累积">
  <meta name="desc" content="拖拽基向量和系数，可视化线性组合c₁v₁+c₂v₂的张成空间，理解线性相关与独立">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#f7f6f2;--surface:#fff;--ink:#1a1814;--ink2:#6b6860;--ink3:#a8a69f;--border:#e4e2da;--blue:#2a5c8f;--blue-light:#e8f0f8;--teal:#0f6e56;--teal-light:#e1f5ee;--amber:#854f0b;--amber-light:#faeeda;--radius:12px;--radius-sm:8px;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);font-family:'Noto Sans SC',sans-serif;color:var(--ink);min-height:100vh;display:flex;flex-direction:column;align-items:center;}
    header{width:100%;max-width:760px;padding:24px 24px 0;}
    .badge{font-size:12px;color:var(--ink2);background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:4px 12px;display:inline-block;margin-bottom:8px;}
    h1{font-size:22px;font-weight:700;}
    .sub{font-size:13px;color:var(--ink2);margin-top:4px;}
    main{width:100%;max-width:760px;padding:16px 24px 32px;display:flex;flex-direction:column;gap:12px;}
    .stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
    .stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px;text-align:center;}
    .stat-lbl{font-size:11px;color:var(--ink2);}
    .stat-val{font-size:13px;font-weight:700;font-family:'JetBrains Mono',monospace;}
    canvas{width:100%;display:block;border-radius:var(--radius);background:var(--surface);border:1px solid var(--border);cursor:grab;}
    .controls{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:grid;grid-template-columns:1fr 1fr;gap:14px;}
    .sl-row{display:flex;flex-direction:column;gap:4px;}
    .sl-lbl{font-size:13px;color:var(--ink2);}
    .sl-val{font-size:18px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--blue);}
    input[type=range]{accent-color:var(--blue);cursor:pointer;width:100%;}
    .fb{background:var(--teal-light);border-left:4px solid var(--teal);border-radius:var(--radius-sm);padding:12px 16px;font-size:14px;line-height:1.7;}
  </style>
</head>
<body>
<header>
  <div class="badge">大学 · 线性代数 · 认知动作：累积</div>
  <h1>向量与线性组合实验室</h1>
  <p class="sub">c₁v₁ + c₂v₂：两个向量的所有线性组合填满平面（除非线性相关）</p>
</header>
<main>
  <div class="stat-row">
    <div class="stat"><div class="stat-lbl">结果向量 c₁v₁+c₂v₂</div><div class="stat-val" id="resVec" style="color:var(--ink)">—</div></div>
    <div class="stat"><div class="stat-lbl">行列式（面积比）</div><div class="stat-val" id="detVal" style="color:var(--teal)">—</div></div>
    <div class="stat"><div class="stat-lbl">线性关系</div><div class="stat-val" id="relVal" style="color:var(--amber)">—</div></div>
  </div>
  <canvas id="cvs"></canvas>
  <div class="controls">
    <div class="sl-row">
      <div class="sl-lbl">系数 c₁（蓝向量的倍数）</div>
      <div class="sl-val" id="c1Label">1.5</div>
      <input type="range" id="c1Sl" min="-3" max="3" step="0.5" value="1.5">
    </div>
    <div class="sl-row">
      <div class="sl-lbl">系数 c₂（橙向量的倍数）</div>
      <div class="sl-val" id="c2Label" style="color:var(--amber)">1.0</div>
      <input type="range" id="c2Sl" min="-3" max="3" step="0.5" value="1">
    </div>
  </div>
  <div style="font-size:13px;color:var(--ink2);padding:4px 0;">拖动向量箭头端点以改变 v₁、v₂</div>
  <div class="fb" id="fb"></div>
</main>
<script>
// PEDAGOGY V1 动态跃迁: 线性组合的"张成"概念只有可视化才能理解
// PEDAGOGY V3 分步揭示: 先看两向量，再看平行四边形，再理解张成空间
// PEDAGOGY V5 操作先于符号: 先拖拽感受组合，再理解span的定义
// PEDAGOGY V6 动作-数学一致: 拖箭头=改变向量，拖滑杆=改变系数
// PEDAGOGY V7 单一认知动作: 累积（累加两个向量的贡献）
// PEDAGOGY V8 概念反馈: 揭示"det≠0时两向量线性无关，张成整个R²"

const cvs=document.getElementById('cvs');
const ctx=cvs.getContext('2d');
const H=380;
const C={
  blue:'#2a5c8f',blueL:'#e8f0f8',teal:'#0f6e56',tealL:'#e1f5ee',
  amber:'#854f0b',amberD:'#c47a0e',amberL:'#faeeda',
  red:'#c0392b',green:'#27ae60',
  ink:'#1a1814',ink2:'#6b6860',ink3:'#a8a69f',border:'#e4e2da',surf:'#fff'
};
const RANGE=5;

let v1={x:2,y:1},v2={x:0.5,y:2};
let dragging=null;

function setup(){
  const r=cvs.getBoundingClientRect(),dpr=window.devicePixelRatio||1;
  cvs.width=r.width*dpr;cvs.height=H*dpr;ctx.scale(dpr,dpr);cvs.style.height=H+'px';
}

function drawArrow(x1,y1,x2,y2,color,width,label,W){
  const margin=44;
  const plotW=W-margin-20;
  const cx=margin+plotW/2;const cy=H/2;
  const sc=plotW/(2*RANGE);
  const px1=cx+x1*sc,py1=cy-y1*sc;
  const px2=cx+x2*sc,py2=cy-y2*sc;
  const angle=Math.atan2(py2-py1,px2-px1);
  ctx.strokeStyle=color;ctx.lineWidth=width;ctx.setLineDash([]);
  ctx.beginPath();ctx.moveTo(px1,py1);ctx.lineTo(px2,py2);ctx.stroke();
  const hs=12;
  ctx.fillStyle=color;
  ctx.beginPath();ctx.moveTo(px2,py2);
  ctx.lineTo(px2-hs*Math.cos(angle-0.4),py2-hs*Math.sin(angle-0.4));
  ctx.lineTo(px2-hs*Math.cos(angle+0.4),py2-hs*Math.sin(angle+0.4));
  ctx.fill();
  if(label){
    ctx.fillStyle=color;ctx.font=`bold 13px 'JetBrains Mono',monospace`;ctx.textAlign='center';ctx.textBaseline='bottom';
    ctx.fillText(label,px2+12*Math.cos(angle+Math.PI/2),py2+12*Math.sin(angle+Math.PI/2));
  }
  return {px:px2,py:py2};
}

function draw(){
  const W=cvs.getBoundingClientRect().width;
  ctx.clearRect(0,0,W,H);
  const c1=parseFloat(document.getElementById('c1Sl').value);
  const c2=parseFloat(document.getElementById('c2Sl').value);
  const margin=44;
  const plotW=W-margin-20;
  const sc=plotW/(2*RANGE);
  const cx=margin+plotW/2,cy=H/2;
  const xToP=x=>cx+x*sc;
  const yToP=y=>cy-y*sc;

  // Grid
  ctx.strokeStyle=C.border;ctx.lineWidth=0.5;
  for(let i=-RANGE;i<=RANGE;i++){
    ctx.beginPath();ctx.moveTo(xToP(i),cy-RANGE*sc);ctx.lineTo(xToP(i),cy+RANGE*sc);ctx.stroke();
    ctx.beginPath();ctx.moveTo(xToP(-RANGE),yToP(i));ctx.lineTo(xToP(RANGE),yToP(i));ctx.stroke();
  }
  // Axes
  ctx.strokeStyle=C.ink2;ctx.lineWidth=1.5;ctx.setLineDash([]);
  ctx.beginPath();ctx.moveTo(margin,cy);ctx.lineTo(margin+plotW,cy);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx,cy-RANGE*sc);ctx.lineTo(cx,cy+RANGE*sc);ctx.stroke();
  ctx.fillStyle=C.ink2;ctx.font=`10px 'JetBrains Mono',monospace`;ctx.textAlign='center';ctx.textBaseline='top';
  for(let i=-RANGE;i<=RANGE;i++) if(i!==0&&i%2===0) ctx.fillText(String(i),xToP(i),cy+3);

  // Parallelogram spanned by c1*v1 and c2*v2
  const ax=c1*v1.x,ay=c1*v1.y;
  const bx=c2*v2.x,by=c2*v2.y;
  ctx.fillStyle=C.teal+'22';
  ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(xToP(ax),yToP(ay));
  ctx.lineTo(xToP(ax+bx),yToP(ay+by));ctx.lineTo(xToP(bx),yToP(by));ctx.closePath();ctx.fill();
  ctx.strokeStyle=C.teal;ctx.lineWidth=1;ctx.setLineDash([3,2]);
  ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(xToP(ax),yToP(ay));
  ctx.lineTo(xToP(ax+bx),yToP(ay+by));ctx.lineTo(xToP(bx),yToP(by));ctx.closePath();ctx.stroke();
  ctx.setLineDash([]);

  // Show grid of multiples to indicate span
  const det=v1.x*v2.y-v1.y*v2.x;
  if(Math.abs(det)>0.1){
    for(let i=-2;i<=2;i++){
      for(let j=-2;j<=2;j++){
        const gx=i*v1.x+j*v2.x;const gy=i*v1.y+j*v2.y;
        if(Math.abs(gx)>RANGE*1.2||Math.abs(gy)>RANGE*1.2) continue;
        ctx.fillStyle=C.teal+'44';ctx.beginPath();ctx.arc(xToP(gx),yToP(gy),3,0,Math.PI*2);ctx.fill();
      }
    }
  }

  // c1*v1 component
  ctx.strokeStyle=C.blue+'88';ctx.lineWidth=1.5;ctx.setLineDash([4,3]);
  ctx.beginPath();ctx.moveTo(xToP(ax+bx),yToP(ay+by));ctx.lineTo(xToP(bx),yToP(by));ctx.stroke();
  ctx.beginPath();ctx.moveTo(xToP(ax+bx),yToP(ay+by));ctx.lineTo(xToP(ax),yToP(ay));ctx.stroke();
  ctx.setLineDash([]);

  // Draw v1 and v2 base vectors
  drawArrow(0,0,v1.x,v1.y,C.blue,2.5,`v₁(${v1.x},${v1.y})`,W);
  drawArrow(0,0,v2.x,v2.y,C.amberD,2.5,`v₂(${v2.x},${v2.y})`,W);

  // Draw c1*v1 and c2*v2
  drawArrow(0,0,ax,ay,C.blue,2,'',W);
  drawArrow(0,0,bx,by,C.amberD,2,'',W);
  // Draw result vector
  drawArrow(0,0,ax+bx,ay+by,C.teal,3,`c₁v₁+c₂v₂`,W);

  // Result point
  ctx.fillStyle=C.teal;ctx.beginPath();ctx.arc(xToP(ax+bx),yToP(ay+by),6,0,Math.PI*2);ctx.fill();

  // Update stats
  const rx=c1*v1.x+c2*v2.x;
  const ry=c1*v1.y+c2*v2.y;
  document.getElementById('resVec').textContent=`(${rx.toFixed(2)}, ${ry.toFixed(2)})`;
  document.getElementById('detVal').textContent=det.toFixed(3);
  const indep=Math.abs(det)>0.1;
  document.getElementById('relVal').textContent=indep?'线性无关':'线性相关!';
  document.getElementById('c1Label').textContent=c1.toFixed(1);
  document.getElementById('c2Label').textContent=c2.toFixed(1);

  // PEDAGOGY V8
  document.getElementById('fb').innerHTML=
    `c₁v₁ + c₂v₂ = ${c1.toFixed(1)}·(${v1.x},${v1.y}) + ${c2.toFixed(1)}·(${v2.x},${v2.y}) = <strong>(${rx.toFixed(2)},${ry.toFixed(2)})</strong>。<br>` +
    `行列式 det = ${det.toFixed(3)}：${indep?
    `<strong>v₁,v₂ 线性无关</strong>，两向量可以张成整个 ℝ²（平面上任意点都可表示为它们的线性组合）。`
    :`<strong>v₁,v₂ 线性相关</strong>，一个是另一个的倍数，只能张成一条直线（子空间维度=1）。`}<br>` +
    `拖动向量箭头端点改变方向；调整 c₁, c₂ 遍历线性组合。当 det≠0 时，格点组成的网格覆盖全平面。`;
}

function getCoords(e){
  const rect=cvs.getBoundingClientRect();
  return {px:e.clientX-rect.left,py:e.clientY-rect.top,W:rect.width};
}
function toMath(px,py,W){
  const margin=44;const plotW=W-margin-20;const sc=plotW/(2*RANGE);
  const cx=margin+plotW/2,cy=H/2;
  const x=(px-cx)/sc;const y=-(py-cy)/sc;
  return {x:Math.round(x*2)/2,y:Math.round(y*2)/2};
}
function ptDist(ax,ay,px,py,W){
  const margin=44;const plotW=W-margin-20;const sc=plotW/(2*RANGE);
  const cx=margin+plotW/2,cy=H/2;
  return Math.hypot(cx+ax*sc-px,cy-ay*sc-py);
}

cvs.addEventListener('pointerdown',e=>{
  const {px,py,W}=getCoords(e);
  const d1=ptDist(v1.x,v1.y,px,py,W);
  const d2=ptDist(v2.x,v2.y,px,py,W);
  if(d1<20||d2<20){
    dragging=d1<d2?'v1':'v2';
    cvs.setPointerCapture(e.pointerId);
  }
});
cvs.addEventListener('pointermove',e=>{
  if(!dragging) return;
  const {px,py,W}=getCoords(e);
  const {x,y}=toMath(px,py,W);
  const cx=Math.max(-RANGE,Math.min(RANGE,x));
  const cy=Math.max(-RANGE,Math.min(RANGE,y));
  if(dragging==='v1') v1={x:cx,y:cy};
  else v2={x:cx,y:cy};
  draw();
});
cvs.addEventListener('pointerup',()=>{dragging=null;});
['c1Sl','c2Sl'].forEach(id=>document.getElementById(id).addEventListener('input',draw));
window.addEventListener('resize',()=>{setup();draw();});
setup();draw();
</script>
</body>
</html>
