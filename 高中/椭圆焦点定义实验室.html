<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>椭圆焦点定义实验室 · 数学可视化</title>
  <meta name="grade" content="高中">
  <meta name="topic" content="圆锥曲线">
  <meta name="difficulty" content="中">
  <meta name="priority" content="A">
  <meta name="cognitive" content="变换">
  <meta name="desc" content="拖动椭圆上的点，实时验证到两焦点距离之和为常数2a，理解椭圆的本质定义">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#f7f6f2;--surface:#fff;--ink:#1a1814;--ink2:#6b6860;--ink3:#a8a69f;--border:#e4e2da;--blue:#2a5c8f;--blue-light:#e8f0f8;--blue-dark:#0c447c;--teal:#0f6e56;--teal-light:#e1f5ee;--amber:#854f0b;--amber-light:#faeeda;--radius:12px;--radius-sm:8px;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);font-family:'Noto Sans SC',sans-serif;color:var(--ink);min-height:100vh;display:flex;flex-direction:column;align-items:center;}
    header{width:100%;max-width:760px;padding:24px 24px 0;}
    .badge{font-size:12px;color:var(--ink2);background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:4px 12px;display:inline-block;margin-bottom:8px;}
    h1{font-size:22px;font-weight:700;}
    .sub{font-size:13px;color:var(--ink2);margin-top:4px;}
    main{width:100%;max-width:760px;padding:16px 24px 32px;display:flex;flex-direction:column;gap:12px;}
    .stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
    .stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px;text-align:center;}
    .stat-lbl{font-size:11px;color:var(--ink2);}
    .stat-val{font-size:19px;font-weight:700;font-family:'JetBrains Mono',monospace;}
    canvas{width:100%;display:block;border-radius:var(--radius);background:var(--surface);border:1px solid var(--border);cursor:grab;}
    canvas:active{cursor:grabbing;}
    .controls{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    .sl-row{display:flex;flex-direction:column;gap:4px;}
    .sl-lbl{font-size:13px;color:var(--ink2);}
    .sl-val{font-size:22px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--blue);}
    input[type=range]{accent-color:var(--blue);cursor:pointer;width:100%;}
    .fb{background:var(--teal-light);border-left:4px solid var(--teal);border-radius:var(--radius-sm);padding:12px 16px;font-size:14px;line-height:1.7;}
    @media(max-width:500px){.stat-row{grid-template-columns:1fr 1fr;}.controls{grid-template-columns:1fr;}}
  </style>
</head>
<body>
<header>
  <div class="badge">高中 · 圆锥曲线 · 认知动作：变换</div>
  <h1>椭圆焦点定义实验室</h1>
  <p class="sub">拖动椭圆上的点 P，两段距离之和始终等于 2a——这就是椭圆的本质！</p>
</header>
<main>
  <div class="stat-row">
    <div class="stat"><div class="stat-lbl">PF₁</div><div class="stat-val" id="pf1Val" style="color:var(--blue)">—</div></div>
    <div class="stat"><div class="stat-lbl">PF₂</div><div class="stat-val" id="pf2Val" style="color:var(--amber)">—</div></div>
    <div class="stat"><div class="stat-lbl">PF₁+PF₂</div><div class="stat-val" id="sumVal" style="color:var(--teal)">—</div></div>
    <div class="stat"><div class="stat-lbl">2a（半长轴×2）</div><div class="stat-val" id="twoaVal" style="color:var(--ink2)">—</div></div>
  </div>
  <canvas id="cvs"></canvas>
  <div class="controls">
    <div class="sl-row">
      <div class="sl-lbl">半长轴 a</div>
      <div class="sl-val" id="aLabel">3.0</div>
      <input type="range" id="aSl" min="1.5" max="5" step="0.1" value="3">
    </div>
    <div class="sl-row">
      <div class="sl-lbl">半焦距 c（c < a）</div>
      <div class="sl-val" id="cLabel">2.0</div>
      <input type="range" id="cSl" min="0.2" max="4.8" step="0.1" value="2">
    </div>
  </div>
  <div class="fb" id="fb">拖动红色点 P 沿椭圆移动，观察两段距离之和是否始终保持不变。</div>
</main>
<script>
// PEDAGOGY V1 动态跃迁: 焦点定义的"和为常数"只有动态拖动才能被感知
// PEDAGOGY V3 分步揭示: 先看椭圆，再拖动P，最后看数值验证
// PEDAGOGY V5 操作先于符号: 先拖再看公式
// PEDAGOGY V6 动作-数学一致: 拖动P沿椭圆=改变PF₁和PF₂
// PEDAGOGY V7 单一认知动作: 变换（点在椭圆上移动）
// PEDAGOGY V8 概念反馈: 揭示"椭圆=到两焦点距离之和为常数的点的集合"

const cvs = document.getElementById('cvs');
const ctx = cvs.getContext('2d');
const H = 380;
const C = {
  blue:'#2a5c8f', blueL:'#e8f0f8', teal:'#0f6e56', tealL:'#e1f5ee',
  amber:'#854f0b', amberL:'#faeeda', amberD:'#c47a0e', red:'#b84040',
  ink:'#1a1814', ink2:'#6b6860', ink3:'#a8a69f', border:'#e4e2da', surf:'#fff'
};

function setup(){
  const r = cvs.getBoundingClientRect(), dpr = window.devicePixelRatio||1;
  cvs.width = r.width*dpr; cvs.height = H*dpr; ctx.scale(dpr,dpr); cvs.style.height = H+'px';
}

let pAngle = 0.5; // angle parameter for P on ellipse
let dragging = false;
let scale = 50; // pixels per unit

function getParams(){
  const a = parseFloat(document.getElementById('aSl').value);
  let c = parseFloat(document.getElementById('cSl').value);
  if(c >= a) c = a - 0.1;
  const b = Math.sqrt(a*a - c*c);
  return {a, b, c};
}

function getCenter(){
  const W = cvs.getBoundingClientRect().width;
  return {cx: W/2, cy: H/2};
}

function pOnEllipse(angle, a, b, cx, cy){
  return {x: cx + a*scale*Math.cos(angle), y: cy - b*scale*Math.sin(angle)};
}

function draw(){
  const W = cvs.getBoundingClientRect().width;
  ctx.clearRect(0,0,W,H);
  const {a,b,c} = getParams();
  const {cx,cy} = getCenter();

  // Grid
  ctx.strokeStyle = C.border; ctx.lineWidth = 0.5;
  for(let x=0;x<W;x+=scale){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for(let y=0;y<H;y+=scale){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  // Axes
  ctx.strokeStyle = C.ink2; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(0,cy); ctx.lineTo(W,cy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx,0); ctx.lineTo(cx,H); ctx.stroke();

  // Tick labels
  ctx.fillStyle=C.ink3; ctx.font=`10px 'JetBrains Mono',monospace`; ctx.textAlign='center'; ctx.textBaseline='top';
  for(let i=-6;i<=6;i++){
    if(i!==0) ctx.fillText(String(i), cx+i*scale, cy+3);
  }

  // Ellipse
  ctx.strokeStyle = C.ink; ctx.lineWidth=2.5; ctx.setLineDash([]);
  ctx.beginPath();
  ctx.ellipse(cx, cy, a*scale, b*scale, 0, 0, Math.PI*2);
  ctx.stroke();

  // Light fill
  ctx.fillStyle = C.blueL+'44';
  ctx.beginPath(); ctx.ellipse(cx, cy, a*scale, b*scale, 0, 0, Math.PI*2); ctx.fill();

  // Foci
  const f1x = cx - c*scale, f1y = cy;
  const f2x = cx + c*scale, f2y = cy;
  [f1x, f2x].forEach((fx, i)=>{
    const color = i===0?C.blue:C.amberD;
    ctx.fillStyle = color;
    ctx.beginPath(); ctx.arc(fx, cy, 8, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle='#fff'; ctx.font=`bold 11px 'JetBrains Mono',monospace`; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('F'+(i+1), fx, cy);
    ctx.fillStyle=color; ctx.font=`12px 'Noto Sans SC',sans-serif`; ctx.textAlign='center'; ctx.textBaseline='top';
    ctx.fillText(`F${i+1}(${i===0?'-':'+'}${c.toFixed(1)},0)`, fx, cy+12);
  });

  // Point P
  const P = pOnEllipse(pAngle, a, b, cx, cy);
  const d1 = Math.hypot(P.x-f1x, P.y-f1y)/scale;
  const d2 = Math.hypot(P.x-f2x, P.y-f2y)/scale;

  // Lines PF1, PF2
  ctx.strokeStyle = C.blue; ctx.lineWidth = 2; ctx.setLineDash([6,3]);
  ctx.beginPath(); ctx.moveTo(P.x,P.y); ctx.lineTo(f1x,f1y); ctx.stroke();
  ctx.strokeStyle = C.amberD;
  ctx.beginPath(); ctx.moveTo(P.x,P.y); ctx.lineTo(f2x,f2y); ctx.stroke();
  ctx.setLineDash([]);

  // Distance labels
  const m1x=(P.x+f1x)/2, m1y=(P.y+f1y)/2;
  const m2x=(P.x+f2x)/2, m2y=(P.y+f2y)/2;
  ctx.fillStyle=C.blue; ctx.font=`bold 13px 'JetBrains Mono',monospace`; ctx.textAlign='center'; ctx.textBaseline='bottom';
  ctx.fillText(d1.toFixed(2), m1x, m1y-4);
  ctx.fillStyle=C.amberD;
  ctx.fillText(d2.toFixed(2), m2x, m2y-4);

  // Sum annotation
  const sumOk = Math.abs(d1+d2-2*a) < 0.01;
  ctx.fillStyle = sumOk ? C.teal : C.red;
  ctx.font=`bold 14px 'Noto Sans SC',sans-serif`; ctx.textAlign='center'; ctx.textBaseline='bottom';
  ctx.fillText(`PF₁+PF₂ = ${(d1+d2).toFixed(2)} = 2a ✓`, cx, H-10);

  // P dot
  ctx.fillStyle = C.red;
  ctx.beginPath(); ctx.arc(P.x, P.y, 10, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font=`bold 12px 'Noto Sans SC',sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('P', P.x, P.y);

  // Axes labels
  ctx.fillStyle=C.ink; ctx.font=`bold 13px 'Noto Sans SC',sans-serif`; ctx.textAlign='left'; ctx.textBaseline='top';
  ctx.fillText(`a=${a.toFixed(1)}, b=${b.toFixed(2)}, c=${c.toFixed(1)}`, 10, 8);
  ctx.fillStyle=C.ink2; ctx.font=`12px 'Noto Sans SC',sans-serif`;
  ctx.fillText(`方程：x²/${(a*a).toFixed(1)} + y²/${(b*b).toFixed(2)} = 1`, 10, 26);

  // Update stats
  document.getElementById('pf1Val').textContent = d1.toFixed(2);
  document.getElementById('pf2Val').textContent = d2.toFixed(2);
  document.getElementById('sumVal').textContent = (d1+d2).toFixed(2);
  document.getElementById('twoaVal').textContent = (2*a).toFixed(2);
  document.getElementById('aLabel').textContent = a.toFixed(1);
  document.getElementById('cLabel').textContent = c.toFixed(1);

  // PEDAGOGY V8
  const e = (c/a).toFixed(2);
  document.getElementById('fb').innerHTML =
    `无论点 P 移到椭圆上哪个位置，<strong>PF₁ + PF₂ = ${(d1+d2).toFixed(2)} ≈ 2a = ${(2*a).toFixed(2)}</strong>，始终不变！<br>` +
    `离心率 e = c/a = ${e}（0 < e < 1），e越小越圆，e越大越"扁"。<br>` +
    `<strong>椭圆的本质定义：到两定点（焦点）距离之和为常数的点的轨迹。</strong>`;
}

// Drag logic
function ptToAngle(px, py, a, b, cx, cy){
  // Project click onto ellipse by angle
  const dx = (px-cx)/(a*scale);
  const dy = -(py-cy)/(b*scale);
  return Math.atan2(dy, dx);
}

cvs.addEventListener('pointerdown', e=>{
  const rect = cvs.getBoundingClientRect();
  const px = (e.clientX-rect.left);
  const py = (e.clientY-rect.top);
  const {a,b} = getParams();
  const {cx,cy} = getCenter();
  const P = pOnEllipse(pAngle, a, b, cx, cy);
  if(Math.hypot(px-P.x, py-P.y) < 20){
    dragging = true;
    cvs.setPointerCapture(e.pointerId);
  }
});

cvs.addEventListener('pointermove', e=>{
  if(!dragging) return;
  const rect = cvs.getBoundingClientRect();
  const px = (e.clientX-rect.left);
  const py = (e.clientY-rect.top);
  const {a,b} = getParams();
  const {cx,cy} = getCenter();
  pAngle = ptToAngle(px, py, a, b, cx, cy);
  draw();
});

cvs.addEventListener('pointerup', ()=>{ dragging=false; });

document.getElementById('aSl').addEventListener('input', ()=>{
  // Clamp c < a
  const a = parseFloat(document.getElementById('aSl').value);
  const cSl = document.getElementById('cSl');
  if(parseFloat(cSl.value) >= a) cSl.value = (a-0.2).toFixed(1);
  draw();
});
document.getElementById('cSl').addEventListener('input', draw);

window.addEventListener('resize',()=>{ setup(); draw(); });
setup(); draw();
</script>
</body>
</html>
