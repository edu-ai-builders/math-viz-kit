<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>单调性与极值实验室 · 数学可视化</title>
  <meta name="grade" content="高中">
  <meta name="topic" content="导数应用">
  <meta name="difficulty" content="高">
  <meta name="priority" content="A">
  <meta name="cognitive" content="变换">
  <meta name="desc" content="原函数与导函数双图联动：f'(x)>0单调递增，f'(x)=0极值点，f'(x)<0单调递减">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#f7f6f2;--surface:#fff;--ink:#1a1814;--ink2:#6b6860;--ink3:#a8a69f;--border:#e4e2da;--blue:#2a5c8f;--blue-light:#e8f0f8;--teal:#0f6e56;--teal-light:#e1f5ee;--amber:#854f0b;--amber-light:#faeeda;--radius:12px;--radius-sm:8px;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);font-family:'Noto Sans SC',sans-serif;color:var(--ink);min-height:100vh;display:flex;flex-direction:column;align-items:center;}
    header{width:100%;max-width:760px;padding:24px 24px 0;}
    .badge{font-size:12px;color:var(--ink2);background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:4px 12px;display:inline-block;margin-bottom:8px;}
    h1{font-size:22px;font-weight:700;}
    .sub{font-size:13px;color:var(--ink2);margin-top:4px;}
    main{width:100%;max-width:760px;padding:16px 24px 32px;display:flex;flex-direction:column;gap:12px;}
    canvas{width:100%;display:block;border-radius:var(--radius);background:var(--surface);border:1px solid var(--border);}
    .controls{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
    .fn-row{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
    .fn-btn{padding:9px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:12px;font-family:'JetBrains Mono',monospace;cursor:pointer;background:var(--surface);transition:all .2s;text-align:center;}
    .fn-btn.active{background:var(--blue);color:#fff;border-color:var(--blue);}
    .sl-row{display:flex;flex-direction:column;gap:4px;}
    .sl-lbl{font-size:13px;color:var(--ink2);}
    .sl-val{font-size:18px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--blue);}
    input[type=range]{accent-color:var(--blue);cursor:pointer;width:100%;}
    .fb{background:var(--teal-light);border-left:4px solid var(--teal);border-radius:var(--radius-sm);padding:12px 16px;font-size:14px;line-height:1.7;}
  </style>
</head>
<body>
<header>
  <div class="badge">高中 · 导数应用 · 认知动作：变换</div>
  <h1>单调性与极值实验室</h1>
  <p class="sub">上图 f(x) · 下图 f'(x)——导函数的零点和正负区间决定极值和单调性</p>
</header>
<main>
  <div class="fn-row">
    <button class="fn-btn active" onclick="setFn(0,this)">x³−3x</button>
    <button class="fn-btn" onclick="setFn(1,this)">x⁴−4x²</button>
    <button class="fn-btn" onclick="setFn(2,this)">sin(x)</button>
    <button class="fn-btn" onclick="setFn(3,this)">x·e^(−x²)</button>
    <button class="fn-btn" onclick="setFn(4,this)">x³−ax</button>
    <button class="fn-btn" onclick="setFn(5,this)">自定义a·x²+b</button>
  </div>
  <canvas id="cvs"></canvas>
  <div class="controls">
    <div class="sl-row">
      <div class="sl-lbl">参数 a（影响第4/5个函数）</div>
      <div class="sl-val" id="aLabel">2.0</div>
      <input type="range" id="aSl" min="-4" max="4" step="0.5" value="2">
    </div>
    <div class="sl-row">
      <div class="sl-lbl">参数 b（影响第5个函数）</div>
      <div class="sl-val" id="bLabel">0.0</div>
      <input type="range" id="bSl" min="-4" max="4" step="0.5" value="0">
    </div>
    <div class="sl-row">
      <div class="sl-lbl">x₀（查询点）</div>
      <div class="sl-val" id="x0Label" style="color:var(--amber)">1.0</div>
      <input type="range" id="x0Sl" min="-3" max="3" step="0.1" value="1">
    </div>
  </div>
  <div class="fb" id="fb"></div>
</main>
<script>
// PEDAGOGY V1 动态跃迁: 原函数和导函数的对应关系只有联动才能理解
// PEDAGOGY V2 表征桥接: 上方f(x)图像 ↔ 下方f'(x)图像，颜色区间对应
// PEDAGOGY V4 信号聚焦: 绿区间=f'(x)>0递增，红区间=f'(x)<0递减，橙点=极值
// PEDAGOGY V7 单一认知动作: 变换（原函数形状←→导函数符号）
// PEDAGOGY V8 概念反馈: 揭示极值点处f'=0，且符号改变

const cvs=document.getElementById('cvs');
const ctx=cvs.getContext('2d');
const H=500;
const C={
  blue:'#2a5c8f',blueL:'#e8f0f8',teal:'#0f6e56',tealL:'#e1f5ee',
  amber:'#854f0b',amberD:'#c47a0e',amberL:'#faeeda',
  red:'#c0392b',green:'#27ae60',
  ink:'#1a1814',ink2:'#6b6860',ink3:'#a8a69f',border:'#e4e2da',surf:'#fff'
};

const FNS=[
  {label:'x³−3x',       f:(x,a)=>x**3-3*x,          df:(x,a)=>3*x**2-3},
  {label:'x⁴−4x²',      f:(x,a)=>x**4-4*x**2,       df:(x,a)=>4*x**3-8*x},
  {label:'sin(x)',       f:(x,a)=>Math.sin(x),        df:(x,a)=>Math.cos(x)},
  {label:'x·e^(−x²)',   f:(x,a)=>x*Math.exp(-x*x),   df:(x,a)=>(1-2*x*x)*Math.exp(-x*x)},
  {label:'x³−ax',       f:(x,a)=>x**3-a*x,            df:(x,a)=>3*x**2-a},
  {label:'a·x²+b',      f:(x,a,b)=>a*x**2+b,          df:(x,a,b)=>2*a*x},
];

let fnIdx=0;

function setup(){
  const r=cvs.getBoundingClientRect(),dpr=window.devicePixelRatio||1;
  cvs.width=r.width*dpr;cvs.height=H*dpr;ctx.scale(dpr,dpr);cvs.style.height=H+'px';
}

function setFn(i,btn){
  fnIdx=i;
  document.querySelectorAll('.fn-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  draw();
}

function drawGraph(ctx,margin,plotW,plotH,yRange,xRange,fn,label,color,fillPositive,fillNegative,x0,xToP,yToP){
  // Fill areas where fn>0 (green) and fn<0 (red)
  const N=plotW;
  // Build sign changes
  let prevSign=null,prevX=-xRange;
  for(let px=0;px<=plotW;px++){
    const x=(px/plotW)*(2*xRange)-xRange;
    const y=fn(x);
    const sign=y>0?1:y<0?-1:0;
    if(sign!==0){
      if(fillPositive&&sign>0){
        ctx.fillStyle=C.green+'22';
        ctx.fillRect(xToP(x),margin.top,1,plotH);
      }
      if(fillNegative&&sign<0){
        ctx.fillStyle=C.red+'22';
        ctx.fillRect(xToP(x),margin.top,1,plotH);
      }
    }
  }

  // Grid
  ctx.strokeStyle=C.border;ctx.lineWidth=0.5;
  for(let i=-4;i<=4;i++){
    ctx.beginPath();ctx.moveTo(xToP(i),margin.top);ctx.lineTo(xToP(i),margin.top+plotH);ctx.stroke();
    const yv=i*(yRange/4);
    ctx.beginPath();ctx.moveTo(margin.left,yToP(yv));ctx.lineTo(margin.left+plotW,yToP(yv));ctx.stroke();
  }
  // Zero line
  ctx.strokeStyle=C.ink2;ctx.lineWidth=1.5;ctx.setLineDash([]);
  ctx.beginPath();ctx.moveTo(margin.left,yToP(0));ctx.lineTo(margin.left+plotW,yToP(0));ctx.stroke();
  ctx.beginPath();ctx.moveTo(xToP(0),margin.top);ctx.lineTo(xToP(0),margin.top+plotH);ctx.stroke();

  // Curve
  ctx.strokeStyle=color;ctx.lineWidth=2.5;ctx.setLineDash([]);
  ctx.beginPath();let first=true;
  for(let px=0;px<=plotW;px+=2){
    const x=(px/plotW)*(2*xRange)-xRange;
    const y=fn(x);
    if(!isFinite(y)||Math.abs(y)>yRange*1.5){first=true;continue;}
    first?(ctx.moveTo(margin.left+px,yToP(y)),first=false):ctx.lineTo(margin.left+px,yToP(y));
  }
  ctx.stroke();

  // x0 vertical line
  ctx.strokeStyle=C.amberD;ctx.lineWidth=1.5;ctx.setLineDash([4,3]);
  ctx.beginPath();ctx.moveTo(xToP(x0),margin.top);ctx.lineTo(xToP(x0),margin.top+plotH);ctx.stroke();
  ctx.setLineDash([]);
  const yx0=fn(x0);
  if(isFinite(yx0)&&Math.abs(yx0)<=yRange*1.3){
    ctx.fillStyle=C.amberD;ctx.beginPath();ctx.arc(xToP(x0),yToP(yx0),5,0,Math.PI*2);ctx.fill();
  }

  // Label
  ctx.fillStyle=color;ctx.font=`bold 12px 'JetBrains Mono',monospace`;ctx.textAlign='left';ctx.textBaseline='top';
  ctx.fillText(label,margin.left+4,margin.top+4);
}

function draw(){
  const W=cvs.getBoundingClientRect().width;
  ctx.clearRect(0,0,W,H);
  const a=parseFloat(document.getElementById('aSl').value);
  const b=parseFloat(document.getElementById('bSl').value);
  const x0=parseFloat(document.getElementById('x0Sl').value);
  const fn=FNS[fnIdx];
  const f=x=>fn.f(x,a,b);
  const df=x=>fn.df(x,a,b);

  const xRange=3.5;
  const yRange=6;
  const yRangeDer=8;
  const margin={left:44,right:20,top:0,bottom:4};
  const plotW=W-margin.left-margin.right;
  const halfH=H/2-10;

  const xToP=x=>margin.left+(x+xRange)/(2*xRange)*plotW;
  const yToP=(y,base,range)=>base+(range-y)/(2*range)*halfH;

  // Top graph: f(x)
  const topBase=8;
  drawGraph(ctx,{top:topBase,left:margin.left},plotW,halfH,yRange,xRange,f,`y=${fn.label}`,C.blue,true,true,x0,xToP,y=>yToP(y,topBase,yRange));
  // f(x0)
  const fx0=f(x0);
  if(isFinite(fx0)&&Math.abs(fx0)<=yRange*1.3){
    ctx.fillStyle=C.amberD;ctx.font=`12px 'JetBrains Mono',monospace`;ctx.textAlign='left';ctx.textBaseline='bottom';
    ctx.fillText(`f(${x0.toFixed(1)})=${fx0.toFixed(2)}`,xToP(x0)+4,yToP(fx0,topBase,yRange)-4);
  }

  // Divider
  ctx.strokeStyle=C.border;ctx.lineWidth=2;ctx.setLineDash([]);
  ctx.beginPath();ctx.moveTo(margin.left,H/2);ctx.lineTo(margin.left+plotW,H/2);ctx.stroke();

  // Bottom graph: f'(x)
  const botBase=H/2+8;
  drawGraph(ctx,{top:botBase,left:margin.left},plotW,halfH,yRangeDer,xRange,df,`y=f'(x)`,C.teal,true,true,x0,xToP,y=>yToP(y,botBase,yRangeDer));
  const dfx0=df(x0);
  if(isFinite(dfx0)&&Math.abs(dfx0)<=yRangeDer*1.3){
    ctx.fillStyle=C.amberD;ctx.font=`12px 'JetBrains Mono',monospace`;ctx.textAlign='left';ctx.textBaseline='bottom';
    ctx.fillText(`f'(${x0.toFixed(1)})=${dfx0.toFixed(2)}`,xToP(x0)+4,yToP(dfx0,botBase,yRangeDer)-4);
  }

  // Axis labels for bottom
  ctx.fillStyle=C.ink2;ctx.font=`11px 'JetBrains Mono',monospace`;ctx.textAlign='center';ctx.textBaseline='top';
  for(let i=-4;i<=4;i++) ctx.fillText(String((i*xRange/4).toFixed(1)),xToP(i*xRange/4),yToP(0,botBase,yRangeDer)+3);

  // Update labels
  document.getElementById('aLabel').textContent=a.toFixed(1);
  document.getElementById('bLabel').textContent=b.toFixed(1);
  document.getElementById('x0Label').textContent=x0.toFixed(1);

  // Find critical points (where f'=0)
  const crits=[];
  for(let i=-350;i<350;i++){
    const x1=i*xRange/350,x2=(i+1)*xRange/350;
    const d1=df(x1),d2=df(x2);
    if(isFinite(d1)&&isFinite(d2)&&d1*d2<0){
      const xc=(x1+x2)/2;
      crits.push(xc);
      // Draw on both graphs
      ctx.fillStyle=C.amberD;ctx.beginPath();ctx.arc(xToP(xc),yToP(f(xc),topBase,yRange),6,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=C.amberD;ctx.beginPath();ctx.arc(xToP(xc),yToP(0,botBase,yRangeDer),6,0,Math.PI*2);ctx.fill();
    }
  }

  // PEDAGOGY V8
  const dfx0v=dfx0;
  const trend=dfx0v>0.01?'f\'(x₀)>0，函数在此处单调递增↗':dfx0v<-0.01?'f\'(x₀)<0，函数在此处单调递减↘':'f\'(x₀)≈0，可能是极值点';
  document.getElementById('fb').innerHTML=
    `上图：f(x)=${fn.label}，绿区间=递增，红区间=递减。橙点=极值点。<br>` +
    `下图：f'(x)（导函数），正值→上方=原函数递增，负值→下方=原函数递减。<br>` +
    `在 x₀=${x0.toFixed(1)} 处：f'(x₀) = <strong>${dfx0v.toFixed(3)}</strong>，${trend}。<br>` +
    `<strong>极值点：f'=0 且 f' 变号处（正→负为极大，负→正为极小）。</strong> 共发现 ${crits.length} 个极值点。`;
}

['aSl','bSl','x0Sl'].forEach(id=>document.getElementById(id).addEventListener('input',draw));
window.addEventListener('resize',()=>{setup();draw();});
setup();draw();
</script>
</body>
</html>
