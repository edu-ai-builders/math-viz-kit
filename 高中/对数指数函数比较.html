<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>对数与指数函数 · 数学可视化</title>
  <meta name="grade" content="高中">
  <meta name="topic" content="函数">
  <meta name="difficulty" content="中">
  <meta name="priority" content="A">
  <meta name="cognitive" content="比较">
  <meta name="desc" content="指数函数与对数函数互为反函数，关于y=x对称，动态调整底数观察图形变化">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#f7f6f2;--surface:#fff;--ink:#1a1814;--ink2:#6b6860;--ink3:#a8a69f;--border:#e4e2da;--blue:#2a5c8f;--blue-light:#e8f0f8;--teal:#0f6e56;--teal-light:#e1f5ee;--amber:#854f0b;--amber-light:#faeeda;--radius:12px;--radius-sm:8px;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);font-family:'Noto Sans SC',sans-serif;color:var(--ink);min-height:100vh;display:flex;flex-direction:column;align-items:center;}
    header{width:100%;max-width:760px;padding:24px 24px 0;}
    .badge{font-size:12px;color:var(--ink2);background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:4px 12px;display:inline-block;margin-bottom:8px;}
    h1{font-size:22px;font-weight:700;}
    .sub{font-size:13px;color:var(--ink2);margin-top:4px;}
    main{width:100%;max-width:760px;padding:16px 24px 32px;display:flex;flex-direction:column;gap:12px;}
    .stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
    .stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px;text-align:center;}
    .stat-lbl{font-size:11px;color:var(--ink2);}
    .stat-val{font-size:17px;font-weight:700;font-family:'JetBrains Mono',monospace;}
    canvas{width:100%;display:block;border-radius:var(--radius);background:var(--surface);border:1px solid var(--border);}
    .controls{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:grid;grid-template-columns:1fr 1fr;gap:14px;}
    .sl-row{display:flex;flex-direction:column;gap:4px;}
    .sl-lbl{font-size:13px;color:var(--ink2);}
    .sl-val{font-size:22px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--blue);}
    input[type=range]{accent-color:var(--blue);cursor:pointer;width:100%;}
    .fb{background:var(--teal-light);border-left:4px solid var(--teal);border-radius:var(--radius-sm);padding:12px 16px;font-size:14px;line-height:1.7;}
    @media(max-width:500px){.controls{grid-template-columns:1fr;}}
  </style>
</head>
<body>
<header>
  <div class="badge">高中 · 函数 · 认知动作：比较</div>
  <h1>对数与指数函数</h1>
  <p class="sub">互为反函数，关于 y=x 对称——调整底数看两条曲线如何随底数变化</p>
</header>
<main>
  <div class="stat-row">
    <div class="stat"><div class="stat-lbl">底数 a</div><div class="stat-val" id="aStatV" style="color:var(--blue)">2.0</div></div>
    <div class="stat"><div class="stat-lbl">指数函数</div><div class="stat-val" id="expLbl" style="color:var(--blue);font-size:14px">y=2^x</div></div>
    <div class="stat"><div class="stat-lbl">对数函数</div><div class="stat-val" id="logLbl" style="color:var(--amber);font-size:14px">y=log₂x</div></div>
    <div class="stat"><div class="stat-lbl">过定点</div><div class="stat-val" style="color:var(--teal);font-size:13px">(1,0)&(0,1)</div></div>
  </div>
  <canvas id="cvs"></canvas>
  <div class="controls">
    <div class="sl-row">
      <div class="sl-lbl">底数 a</div>
      <div class="sl-val" id="aLabel">2.0</div>
      <input type="range" id="aSl" min="1.1" max="5" step="0.1" value="2.0">
    </div>
    <div class="sl-row">
      <div class="sl-lbl">x₀ 处的值</div>
      <div class="sl-val" id="x0Label" style="color:var(--teal)">1</div>
      <input type="range" id="x0Sl" min="-3" max="4" step="0.5" value="1">
    </div>
  </div>
  <div class="fb" id="fb"></div>
</main>
<script>
// PEDAGOGY V1 动态跃迁: 互为反函数的对称性只有并排动态才能感受
// PEDAGOGY V2 表征桥接: 图形 ↔ 函数值 ↔ 反函数关系
// PEDAGOGY V4 信号聚焦: 蓝=指数，橙=对数，灰虚线=y=x对称轴
// PEDAGOGY V7 单一认知动作: 比较（指数增长vs对数增长，互为反函数）
// PEDAGOGY V8 概念反馈: 揭示"互为反函数=关于y=x对称=互相交换x和y"

const cvs=document.getElementById('cvs');
const ctx=cvs.getContext('2d');
const H=400;
const C={
  blue:'#2a5c8f',blueL:'#e8f0f8',teal:'#0f6e56',tealL:'#e1f5ee',
  amber:'#854f0b',amberL:'#faeeda',amberD:'#c47a0e',
  ink:'#1a1814',ink2:'#6b6860',ink3:'#a8a69f',border:'#e4e2da',surf:'#fff'
};

function setup(){
  const r=cvs.getBoundingClientRect(),dpr=window.devicePixelRatio||1;
  cvs.width=r.width*dpr;cvs.height=H*dpr;ctx.scale(dpr,dpr);cvs.style.height=H+'px';
}

function draw(){
  const W=cvs.getBoundingClientRect().width;
  ctx.clearRect(0,0,W,H);
  const a=parseFloat(document.getElementById('aSl').value);
  const x0=parseFloat(document.getElementById('x0Sl').value);
  const margin={left:44,right:20,top:16,bottom:40};
  const plotW=W-margin.left-margin.right;
  const plotH=H-margin.top-margin.bottom;
  const xRange=5,yRange=5;
  const xToP=x=>margin.left+(x+xRange)/(2*xRange)*plotW;
  const yToP=y=>margin.top+(yRange-y)/(2*yRange)*plotH;

  // Grid
  ctx.strokeStyle=C.border;ctx.lineWidth=0.5;
  for(let i=-xRange;i<=xRange;i++){ctx.beginPath();ctx.moveTo(xToP(i),margin.top);ctx.lineTo(xToP(i),margin.top+plotH);ctx.stroke();}
  for(let i=-yRange;i<=yRange;i++){ctx.beginPath();ctx.moveTo(margin.left,yToP(i));ctx.lineTo(margin.left+plotW,yToP(i));ctx.stroke();}

  // y=x (reflection axis)
  ctx.strokeStyle=C.ink3;ctx.lineWidth=1.5;ctx.setLineDash([6,4]);
  ctx.beginPath();ctx.moveTo(xToP(-xRange),yToP(-xRange));ctx.lineTo(xToP(xRange),yToP(xRange));ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle=C.ink3;ctx.font=`italic 12px 'JetBrains Mono',monospace`;ctx.textAlign='left';ctx.textBaseline='top';
  ctx.fillText('y=x',xToP(3.5),yToP(3.5)+3);

  // Axes
  ctx.strokeStyle=C.ink2;ctx.lineWidth=1.5;ctx.setLineDash([]);
  ctx.beginPath();ctx.moveTo(margin.left,yToP(0));ctx.lineTo(margin.left+plotW,yToP(0));ctx.stroke();
  ctx.beginPath();ctx.moveTo(xToP(0),margin.top);ctx.lineTo(xToP(0),margin.top+plotH);ctx.stroke();
  ctx.fillStyle=C.ink2;ctx.font=`11px 'JetBrains Mono',monospace`;ctx.textAlign='center';ctx.textBaseline='top';
  for(let i=-xRange;i<=xRange;i++){if(i!==0)ctx.fillText(String(i),xToP(i),yToP(0)+3);}
  ctx.textAlign='right';ctx.textBaseline='middle';
  for(let i=-yRange;i<=yRange;i++){if(i!==0)ctx.fillText(String(i),margin.left-3,yToP(i));}

  // Exponential curve: y = a^x
  ctx.strokeStyle=C.blue;ctx.lineWidth=2.5;ctx.setLineDash([]);
  ctx.beginPath();let first=true;
  for(let px=0;px<=plotW;px+=2){
    const x=(px/plotW)*(2*xRange)-xRange;
    const y=Math.pow(a,x);
    if(y>yRange*1.5||y<-yRange*1.5){first=true;continue;}
    first?(ctx.moveTo(margin.left+px,yToP(y)),first=false):ctx.lineTo(margin.left+px,yToP(y));
  }
  ctx.stroke();

  // Logarithm curve: y = log_a(x)
  ctx.strokeStyle=C.amberD;ctx.lineWidth=2.5;ctx.setLineDash([]);
  ctx.beginPath();first=true;
  for(let px=0;px<=plotW;px+=2){
    const x=(px/plotW)*(2*xRange)-xRange;
    if(x<=0){first=true;continue;}
    const y=Math.log(x)/Math.log(a);
    if(y>yRange*1.5||y<-yRange*1.5){first=true;continue;}
    first?(ctx.moveTo(margin.left+px,yToP(y)),first=false):ctx.lineTo(margin.left+px,yToP(y));
  }
  ctx.stroke();

  // Fixed points: exp passes through (0,1); log passes through (1,0)
  [{x:0,y:1,label:'(0,1)',color:C.blue},{x:1,y:0,label:'(1,0)',color:C.amberD}].forEach(({x,y,label,color})=>{
    ctx.fillStyle=color;ctx.beginPath();ctx.arc(xToP(x),yToP(y),6,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=color;ctx.font=`12px 'JetBrains Mono',monospace`;ctx.textAlign=x<0?'right':'left';ctx.textBaseline='bottom';
    ctx.fillText(label,xToP(x)+4,yToP(y)-4);
  });

  // x0 visualization - show correspondence
  const expAtX0=Math.pow(a,x0);
  const logDomain=x0>0.01;
  const logAtX0=logDomain?Math.log(x0)/Math.log(a):null;

  if(Math.abs(expAtX0)<=yRange*1.3){
    ctx.strokeStyle=C.blue+'88';ctx.lineWidth=1.2;ctx.setLineDash([4,3]);
    ctx.beginPath();ctx.moveTo(xToP(x0),yToP(0));ctx.lineTo(xToP(x0),yToP(expAtX0));ctx.stroke();
    ctx.beginPath();ctx.moveTo(xToP(0),yToP(expAtX0));ctx.lineTo(xToP(x0),yToP(expAtX0));ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle=C.blue;ctx.beginPath();ctx.arc(xToP(x0),yToP(expAtX0),5,0,Math.PI*2);ctx.fill();
  }

  if(logDomain&&logAtX0!==null&&Math.abs(logAtX0)<=yRange*1.3){
    ctx.strokeStyle=C.amberD+'88';ctx.lineWidth=1.2;ctx.setLineDash([4,3]);
    ctx.beginPath();ctx.moveTo(xToP(x0),yToP(0));ctx.lineTo(xToP(x0),yToP(logAtX0));ctx.stroke();
    ctx.beginPath();ctx.moveTo(xToP(0),yToP(logAtX0));ctx.lineTo(xToP(x0),yToP(logAtX0));ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle=C.amberD;ctx.beginPath();ctx.arc(xToP(x0),yToP(logAtX0),5,0,Math.PI*2);ctx.fill();
  }

  // Labels
  ctx.fillStyle=C.blue;ctx.font=`bold 13px 'JetBrains Mono',monospace`;ctx.textAlign='left';ctx.textBaseline='top';
  ctx.fillText(`y=${a.toFixed(1)}^x`,margin.left+4,margin.top+4);
  ctx.fillStyle=C.amberD;
  ctx.fillText(`y=log_${a.toFixed(1)}(x)`,margin.left+4,margin.top+20);

  // Update stats
  document.getElementById('aStatV').textContent=a.toFixed(1);
  document.getElementById('aLabel').textContent=a.toFixed(1);
  document.getElementById('x0Label').textContent=x0.toFixed(1);
  document.getElementById('expLbl').textContent=`y=${a.toFixed(1)}^x`;
  document.getElementById('logLbl').textContent=`y=log_${a.toFixed(1)}x`;

  // PEDAGOGY V8
  const logOfExpAtX0=Math.log(expAtX0)/Math.log(a);
  document.getElementById('fb').innerHTML=
    `底数 a = ${a.toFixed(1)}。<strong>互为反函数</strong>：关于 y=x 对称。<br>` +
    `在 x₀ = ${x0.toFixed(1)} 处：${a.toFixed(1)}^${x0.toFixed(1)} = <strong>${expAtX0.toFixed(3)}</strong>；` +
    `${logDomain?`log_${a.toFixed(1)}(${x0.toFixed(1)}) = <strong>${(logAtX0||0).toFixed(3)}</strong>`:'x₀≤0，对数未定义'}。<br>` +
    `验证反函数：log(a^x) = x，即 log_${a.toFixed(1)}(${expAtX0.toFixed(2)}) ≈ ${logOfExpAtX0.toFixed(4)} ≈ x₀ = ${x0.toFixed(1)} ✓`;
}

document.getElementById('aSl').addEventListener('input',draw);
document.getElementById('x0Sl').addEventListener('input',draw);
window.addEventListener('resize',()=>{setup();draw();});
setup();draw();
</script>
</body>
</html>
