<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>披萨分数实验室 · 数学可视化</title>
  <meta name="grade" content="小学">
  <meta name="topic" content="分数">
  <meta name="difficulty" content="低">
  <meta name="priority" content="A">
  <meta name="cognitive" content="分解">
  <meta name="desc" content="切分圆形披萨理解分数，拖动扇形体会分子分母含义">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#f7f6f2;--surface:#fff;--ink:#1a1814;--ink2:#6b6860;--ink3:#a8a69f;--border:#e4e2da;
      --blue:#2a5c8f;--blue-light:#e8f0f8;--blue-dark:#0c447c;
      --teal:#0f6e56;--teal-light:#e1f5ee;
      --amber:#854f0b;--amber-light:#faeeda;
      --radius:12px;--radius-sm:8px;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);font-family:'Noto Sans SC',sans-serif;color:var(--ink);min-height:100vh;display:flex;flex-direction:column;align-items:center;}
    header{width:100%;max-width:680px;padding:24px 24px 0;}
    .badge{font-size:12px;color:var(--ink2);background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:4px 12px;display:inline-block;margin-bottom:8px;}
    h1{font-size:22px;font-weight:700;}
    .sub{font-size:13px;color:var(--ink2);margin-top:4px;}
    main{width:100%;max-width:680px;padding:16px 24px 32px;display:flex;flex-direction:column;gap:12px;}
    .controls{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;display:grid;grid-template-columns:1fr 1fr;gap:16px;}
    .sl-row{display:flex;flex-direction:column;gap:6px;}
    .sl-label{font-size:13px;color:var(--ink2);}
    .sl-val{font-size:26px;font-weight:700;font-family:'JetBrains Mono',monospace;}
    input[type=range]{accent-color:var(--blue);cursor:pointer;width:100%;}
    .frac-big{background:var(--blue-light);border:2px solid var(--blue);border-radius:var(--radius);padding:12px 18px;text-align:center;}
    .frac-text{font-size:32px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--blue);}
    .frac-word{font-size:14px;color:var(--ink2);margin-top:4px;}
    canvas{width:100%;height:300px;display:block;border-radius:var(--radius);background:var(--surface);border:1px solid var(--border);}
    .fb{background:var(--teal-light);border-left:4px solid var(--teal);border-radius:var(--radius-sm);padding:12px 16px;font-size:14px;line-height:1.7;}
    .insight{background:var(--amber-light);border:2px solid var(--amber);border-radius:var(--radius);padding:12px 16px;font-size:14px;font-weight:500;line-height:1.6;opacity:0;transition:opacity .5s;}
    .insight.show{opacity:1;}
    @media(max-width:500px){.controls{grid-template-columns:1fr;}}
  </style>
</head>
<body>
<header>
  <div class="badge">小学 · 分数 · 认知动作：分解</div>
  <h1>披萨分数实验室</h1>
  <p class="sub">把披萨切成几份，你吃几片，就是分母和分子</p>
</header>
<main>
  <div class="controls">
    <div class="sl-row">
      <div class="sl-label">切成几块（分母）</div>
      <div class="sl-val" id="denV" style="color:var(--blue)">8</div>
      <input type="range" id="denSl" min="2" max="12" value="8">
    </div>
    <div class="sl-row">
      <div class="sl-label">你吃几块（分子）</div>
      <div class="sl-val" id="numV" style="color:var(--teal)">3</div>
      <input type="range" id="numSl" min="0" max="8" value="3">
    </div>
  </div>
  <div class="frac-big">
    <div class="frac-text" id="fracText">3/8</div>
    <div class="frac-word" id="fracWord">八分之三</div>
  </div>
  <canvas id="cvs"></canvas>
  <div class="fb" id="fb"></div>
  <div class="insight" id="insight"></div>
</main>
<script>
// ── 0. 教学法标注 ────────────────────────────────────
// 认知动作：分解
// V1 动态跃迁：切分块数变化时扇形实时重绘，分母变大每块变小可见
// V2 表征桥接：分数符号 + 圆形图 + 中文读法三联动
// V4 信号聚焦：橙=你吃的，灰=剩余，颜色含义单一
// V5 操作先于符号：先看圆图，中文读法在下方
// V6 动作-数学一致：分母滑杆增大→每块变小→对应直觉
// V7 单一认知动作：分解（整体分成等份）
// V8 概念反馈：揭示分子分母的含义，以及等量分数

const cvs=document.getElementById('cvs');
const ctx=cvs.getContext('2d');
const C={blue:'#2a5c8f',blueL:'#e8f0f8',teal:'#0f6e56',tealL:'#e1f5ee',amber:'#854f0b',amberL:'#faeeda',ink:'#1a1814',ink2:'#6b6860',ink3:'#a8a69f',border:'#e4e2da',bg:'#f7f6f2',surf:'#fff'};
// Pizza colors
const PIZZA_TOP='#f5a623', PIZZA_CRUST='#c0770a', PIECE_EAT='#e84040', PIECE_LEFT='#f0d080';

let den=8,num=3,interactions=0;

const CHINESE_NUMS=['零','一','二','三','四','五','六','七','八','九','十','十一','十二'];

function toChineseFrac(n,d){
  return `${CHINESE_NUMS[d]}分之${CHINESE_NUMS[n]}`;
}

function gcd(a,b){return b===0?a:gcd(b,a%b);}

function setup(){
  const r=cvs.getBoundingClientRect(),dpr=window.devicePixelRatio||1;
  cvs.width=r.width*dpr; cvs.height=300*dpr; ctx.scale(dpr,dpr); cvs.style.height='300px';
}

function drawPizza(W,H){
  const cx=W/2, cy=H/2, R=Math.min(W,H)*0.38;
  const startAngle=-Math.PI/2; // 12 o'clock

  // Pizza base (full circle)
  ctx.fillStyle=PIZZA_TOP;
  ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.fill();

  // Slice cuts and fill
  for(let i=0;i<den;i++){
    const a0=startAngle+i*(2*Math.PI/den);
    const a1=startAngle+(i+1)*(2*Math.PI/den);
    const isEaten=i<num;

    ctx.fillStyle=isEaten?PIECE_EAT:PIECE_LEFT;
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,R,a0,a1); ctx.closePath(); ctx.fill();

    // Slice divider
    ctx.strokeStyle='rgba(0,0,0,0.25)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+R*Math.cos(a0),cy+R*Math.sin(a0)); ctx.stroke();
  }

  // Crust outline
  ctx.strokeStyle=PIZZA_CRUST; ctx.lineWidth=5;
  ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.stroke();

  // Center dot
  ctx.fillStyle=PIZZA_CRUST;
  ctx.beginPath(); ctx.arc(cx,cy,4,0,Math.PI*2); ctx.fill();

  // Labels for eaten slices
  for(let i=0;i<num;i++){
    const a=startAngle+(i+0.5)*(2*Math.PI/den);
    const lr=R*0.65;
    ctx.fillStyle='#fff'; ctx.font=`bold 14px 'Noto Sans SC',sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('吃',cx+lr*Math.cos(a),cy+lr*Math.sin(a));
  }

  // Legend
  ctx.fillStyle=PIECE_EAT; ctx.beginPath(); ctx.arc(W-80,20,8,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=C.ink2; ctx.font=`12px 'Noto Sans SC',sans-serif`; ctx.textAlign='left'; ctx.textBaseline='middle';
  ctx.fillText(`吃 ${num} 块`,W-68,20);
  ctx.fillStyle=PIECE_LEFT; ctx.beginPath(); ctx.arc(W-80,40,8,0,Math.PI*2); ctx.fill();
  ctx.fillText(`剩 ${den-num} 块`,W-68,40);
}

function draw(){
  const W=cvs.getBoundingClientRect().width, H=300;
  ctx.clearRect(0,0,W,H);
  drawPizza(W,H);
}

function updateAll(){
  // Clamp num
  if(num>den) num=den;
  document.getElementById('numSl').max=den;
  document.getElementById('numSl').value=num;
  document.getElementById('denV').textContent=den;
  document.getElementById('numV').textContent=num;
  document.getElementById('fracText').textContent=`${num}/${den}`;
  document.getElementById('fracWord').textContent=toChineseFrac(num,den);
  draw();
  showFeedback();
  interactions++;
  if(interactions>=3) showInsight();
}

function showFeedback(){
  // PEDAGOGY V8
  const fb=document.getElementById('fb');
  const val=(num/den*100).toFixed(1);
  let msg=`把披萨切成 <strong>${den}</strong> 块（这是分母），你吃了 <strong>${num}</strong> 块（这是分子）。<br>`;
  msg+=`所以你吃了整个披萨的 <strong>${num}/${den}</strong>（${toChineseFrac(num,den)}），约等于 <strong>${val}%</strong>。`;
  if(num===0) msg=`你一块都没吃！这是 <strong>0/${den} = 0</strong>。`;
  else if(num===den) msg=`你把整个披萨都吃完了！<strong>${num}/${den} = 1</strong>（一整个）。`;
  else {
    const g=gcd(num,den);
    if(g>1) msg+=`<br>注意：${num}/${den} 可以化简为 <strong>${num/g}/${den/g}</strong>（除以公因数 ${g}）。`;
  }
  fb.innerHTML=msg;
}

function showInsight(){
  // PEDAGOGY V8: deeper reveal after multiple interactions
  const ins=document.getElementById('insight');
  ins.innerHTML=`🔍 发现了吗？<br>• <strong>分母越大</strong>，每块越小（切得越细）<br>• <strong>分子越大</strong>，吃的越多<br>• 分数 = 几份中取几份，分母告诉你"总共分成几份"，分子告诉你"取了几份"`;
  ins.classList.add('show');
}

document.getElementById('denSl').addEventListener('input',e=>{den=parseInt(e.target.value);updateAll();});
document.getElementById('numSl').addEventListener('input',e=>{num=parseInt(e.target.value);updateAll();});
window.addEventListener('resize',()=>{setup();draw();});
setup(); updateAll();
</script>
</body>
</html>
