<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>条形图生成器 · 数学可视化</title>
  <meta name="grade" content="小学">
  <meta name="topic" content="统计与图表">
  <meta name="difficulty" content="低">
  <meta name="priority" content="B">
  <meta name="cognitive" content="比较">
  <meta name="desc" content="输入数据自动生成条形图，拖动条高改变数值，理解数据→图表的对应关系">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#fff8f0;--surface:#fff;--ink:#2a1a00;--ink2:#7a5a30;--border:#f0d8b0;--teal:#0a7a50;--teal-light:#d0f0e0;--amber:#c06000;--amber-light:#fff0d0;--radius:12px;--radius-sm:8px;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);font-family:'Noto Sans SC',sans-serif;color:var(--ink);min-height:100vh;display:flex;flex-direction:column;align-items:center;}
    header{width:100%;max-width:620px;padding:20px 20px 0;}
    .badge{font-size:12px;color:var(--ink2);background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:4px 12px;display:inline-block;margin-bottom:8px;}
    h1{font-size:20px;font-weight:700;}
    .sub{font-size:13px;color:var(--ink2);margin-top:4px;}
    main{width:100%;max-width:620px;padding:14px 20px 28px;display:flex;flex-direction:column;gap:10px;}
    .section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;}
    .section-title{font-size:13px;font-weight:700;color:var(--ink2);margin-bottom:8px;}
    .data-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;}
    .data-cell{display:flex;flex-direction:column;gap:4px;}
    .data-label{font-size:12px;color:var(--ink2);}
    .data-input{padding:6px 8px;border:2px solid var(--border);border-radius:var(--radius-sm);font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;width:100%;text-align:center;color:var(--amber);}
    .data-input:focus{border-color:var(--amber);outline:none;}
    canvas{width:100%;display:block;border-radius:var(--radius-sm);background:var(--surface);border:1px solid var(--border);cursor:ns-resize;}
    .preset-row{display:flex;gap:6px;flex-wrap:wrap;}
    .preset-btn{padding:5px 12px;border:2px solid var(--border);border-radius:20px;font-size:12px;cursor:pointer;background:var(--surface);color:var(--ink2);transition:all .2s;}
    .preset-btn:hover{background:var(--amber-light);}
    .fb{background:var(--teal-light);border-left:4px solid var(--teal);border-radius:var(--radius-sm);padding:12px 16px;font-size:13px;line-height:1.7;}
  </style>
</head>
<body>
<header>
  <div class="badge">小学 · 统计与图表 · 认知动作：比较</div>
  <h1>条形图生成器</h1>
  <p class="sub">输入数据→条形图自动更新；拖动条形改变数值</p>
</header>
<main>
  <div class="section">
    <div class="section-title">数据输入（修改数字，图表同步更新）</div>
    <div class="data-grid" id="dataGrid"></div>
  </div>
  <div class="section" style="padding:10px;">
    <div class="section-title">场景预设</div>
    <div class="preset-row">
      <button class="preset-btn" onclick="loadPreset('fruit')">🍎水果销售</button>
      <button class="preset-btn" onclick="loadPreset('score')">📝各科成绩</button>
      <button class="preset-btn" onclick="loadPreset('weather')">🌤每日气温</button>
      <button class="preset-btn" onclick="loadPreset('hobby')">🎮兴趣爱好</button>
    </div>
  </div>
  <canvas id="cvs"></canvas>
  <div class="fb" id="fb">修改数据后条形图会立即更新；也可以拖动条形改变高度。</div>
</main>
<script>
// PEDAGOGY V2 表征桥接: 数字表格与条形图双向联动
// PEDAGOGY V5 操作先于符号: 先操作数据，再观察图表变化
// PEDAGOGY V8 概念反馈: "最高的条形对应最大的数据"

const PRESETS = {
  fruit:{labels:['苹果','香蕉','橙子','葡萄','草莓'],values:[12,8,15,6,10],title:'水果销售量（个）'},
  score:{labels:['语文','数学','英语','科学','美术'],values:[88,95,82,90,78],title:'各科测试成绩（分）'},
  weather:{labels:['周一','周二','周三','周四','周五'],values:[18,22,25,20,16],title:'本周气温（℃）'},
  hobby:{labels:['画画','唱歌','跑步','读书','游戏'],values:[5,8,12,7,15],title:'同学兴趣人数'},
};

const COLORS = ['#c06000','#1a5cb5','#0a7a50','#854f0b','#7b3f9e','#dc2626'];

let data = {labels:['类别A','类别B','类别C','类别D'],values:[30,50,20,40],title:'数量'};
let dragging = null;
let dragStartY = 0;
let dragStartVal = 0;

const cvs = document.getElementById('cvs');
const ctx = cvs.getContext('2d');
const H = 280;

function loadPreset(key) {
  const p = PRESETS[key];
  data = {labels:[...p.labels],values:[...p.values],title:p.title};
  buildInputs();
  draw();
  updateFb();
}

function buildInputs() {
  const grid = document.getElementById('dataGrid');
  grid.innerHTML = data.labels.map((lbl,i)=>`
    <div class="data-cell">
      <div class="data-label">${lbl}</div>
      <input class="data-input" type="number" min="0" max="100" value="${data.values[i]}" oninput="onInput(${i},this.value)">
    </div>
  `).join('');
}

function onInput(i, v) {
  data.values[i] = Math.max(0, Math.min(200, parseFloat(v)||0));
  draw();
  updateFb();
}

function setup() {
  const r = cvs.getBoundingClientRect(), dpr = window.devicePixelRatio||1;
  cvs.width = r.width*dpr; cvs.height = H*dpr;
  ctx.scale(dpr,dpr); cvs.style.height = H+'px';
}

function draw() {
  const r = cvs.getBoundingClientRect();
  const W = r.width;
  ctx.clearRect(0,0,W,H);

  const pad = {l:40,r:16,t:28,b:40};
  const cw = W-pad.l-pad.r;
  const ch = H-pad.t-pad.b;
  const n = data.values.length;
  const maxVal = Math.max(...data.values, 1);
  const barW = cw/n*0.6;
  const gap = cw/n*0.4;

  // Grid lines
  const steps = 5;
  ctx.strokeStyle='#f0d8b0'; ctx.lineWidth=1;
  for(let i=0;i<=steps;i++){
    const y = pad.t+ch - (i/steps)*ch;
    ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(W-pad.r,y); ctx.stroke();
    const v = Math.round((i/steps)*maxVal);
    ctx.fillStyle='#7a5a30'; ctx.font=`10px 'JetBrains Mono',monospace`;
    ctx.textAlign='right'; ctx.textBaseline='middle';
    ctx.fillText(v, pad.l-4, y);
  }

  // Bars
  data.values.forEach((val,i)=>{
    const x = pad.l + i*(cw/n) + gap/2;
    const barH = (val/maxVal)*ch;
    const y = pad.t+ch-barH;

    // Bar
    ctx.fillStyle = COLORS[i%COLORS.length];
    ctx.fillRect(x, y, barW, barH);

    // Drag highlight
    if(dragging===i) {
      ctx.strokeStyle='#2a1a00'; ctx.lineWidth=2;
      ctx.strokeRect(x, y, barW, barH);
    }

    // Value label on top
    ctx.fillStyle='#2a1a00'; ctx.font=`bold 12px 'JetBrains Mono',monospace`;
    ctx.textAlign='center'; ctx.textBaseline='bottom';
    ctx.fillText(val, x+barW/2, y-3);

    // Category label
    ctx.fillStyle='#7a5a30'; ctx.font=`12px 'Noto Sans SC',sans-serif`;
    ctx.textBaseline='top';
    ctx.fillText(data.labels[i], x+barW/2, pad.t+ch+5);
  });

  // Axes
  ctx.strokeStyle='#2a1a00'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(pad.l,pad.t); ctx.lineTo(pad.l,pad.t+ch); ctx.lineTo(W-pad.r,pad.t+ch); ctx.stroke();

  // Title
  ctx.fillStyle='#2a1a00'; ctx.font=`bold 13px 'Noto Sans SC',sans-serif`;
  ctx.textAlign='center'; ctx.textBaseline='top';
  ctx.fillText(data.title, W/2, 6);
}

function updateFb() {
  const max = Math.max(...data.values);
  const min = Math.min(...data.values);
  const maxIdx = data.values.indexOf(max);
  const minIdx = data.values.indexOf(min);
  const sum = data.values.reduce((a,b)=>a+b,0);
  document.getElementById('fb').innerHTML =
    `最多：<strong>${data.labels[maxIdx]}（${max}）</strong>，最少：<strong>${data.labels[minIdx]}（${min}）</strong>，总计：<strong>${sum}</strong>。<br>` +
    `条形越高代表数量越多，条形的高度由数据决定。通过比较条形的长短，可以一眼看出各类别的大小关系。`;
}

// Drag bars
cvs.addEventListener('pointerdown', e=>{
  const r = cvs.getBoundingClientRect();
  const mx = e.clientX-r.left, my = e.clientY-r.top;
  const n = data.values.length;
  const pad = {l:40,r:16,t:28,b:40};
  const cw = r.width-pad.l-pad.r;
  // Find which bar was clicked
  for(let i=0;i<n;i++){
    const gap = cw/n*0.4;
    const x = pad.l + i*(cw/n) + gap/2;
    const barW = cw/n*0.6;
    if(mx>=x && mx<=x+barW){
      dragging = i;
      dragStartY = my;
      dragStartVal = data.values[i];
      cvs.setPointerCapture(e.pointerId);
      break;
    }
  }
});
cvs.addEventListener('pointermove', e=>{
  if(dragging===null) return;
  const r = cvs.getBoundingClientRect();
  const my = e.clientY-r.top;
  const dy = dragStartY-my;
  const ch = H-28-40;
  const maxVal = Math.max(...data.values.map((v,i)=>i===dragging?dragStartVal:v), 1);
  const newVal = Math.max(0, Math.min(200, Math.round(dragStartVal + dy/ch*maxVal)));
  data.values[dragging] = newVal;
  // update input
  const inputs = document.querySelectorAll('.data-input');
  if(inputs[dragging]) inputs[dragging].value = newVal;
  draw(); updateFb();
});
cvs.addEventListener('pointerup',()=>{dragging=null;draw();});

window.addEventListener('resize',()=>{setup();draw();});
setup();
loadPreset('fruit');
</script>
</body>
</html>
