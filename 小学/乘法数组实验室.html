<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>乘法数组实验室 · 数学可视化</title>
  <meta name="grade" content="小学">
  <meta name="topic" content="乘法">
  <meta name="difficulty" content="低">
  <meta name="priority" content="A">
  <meta name="cognitive" content="比较">
  <meta name="desc" content="点阵旋转演示乘法交换律，理解几行几列与几个几的关系">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#f7f6f2; --surface:#ffffff; --ink:#1a1814; --ink2:#6b6860; --ink3:#a8a69f; --border:#e4e2da;
      --blue:#2a5c8f; --blue-light:#e8f0f8; --blue-dark:#0c447c;
      --teal:#0f6e56; --teal-light:#e1f5ee;
      --amber:#854f0b; --amber-light:#faeeda;
      --radius:12px; --radius-sm:8px;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);font-family:'Noto Sans SC',sans-serif;color:var(--ink);min-height:100vh;display:flex;flex-direction:column;align-items:center;}
    header{width:100%;max-width:700px;padding:24px 24px 0;}
    .badge{display:inline-flex;align-items:center;font-size:12px;color:var(--ink2);background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:4px 12px;margin-bottom:8px;}
    h1{font-size:22px;font-weight:700;}
    .sub{font-size:13px;color:var(--ink2);margin-top:4px;}
    main{width:100%;max-width:700px;padding:16px 24px 32px;display:flex;flex-direction:column;gap:12px;}
    .sliders{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;display:grid;grid-template-columns:1fr 1fr;gap:14px;}
    .sl-row{display:flex;flex-direction:column;gap:6px;}
    .sl-label{font-size:13px;color:var(--ink2);}
    .sl-val{font-size:26px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--blue);}
    input[type=range]{width:100%;accent-color:var(--blue);cursor:pointer;}
    .eq-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 18px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
    .eq-main{font-size:22px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--blue);}
    .eq-note{font-size:13px;color:var(--ink2);margin-left:8px;}
    canvas{width:100%;height:300px;display:block;border-radius:var(--radius);background:var(--surface);border:1px solid var(--border);}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
    .btn{padding:12px;border:none;border-radius:var(--radius);font-size:14px;font-family:inherit;font-weight:600;cursor:pointer;transition:all .2s;}
    .btn-primary{background:var(--blue);color:#fff;}
    .btn-primary:hover{background:var(--blue-dark);}
    .btn-secondary{background:var(--surface);color:var(--blue);border:2px solid var(--blue);}
    .btn-secondary:hover{background:var(--blue-light);}
    .fb{background:var(--teal-light);border-left:4px solid var(--teal);border-radius:var(--radius-sm);padding:12px 16px;font-size:14px;line-height:1.7;opacity:0;transition:opacity .5s;}
    .fb.show{opacity:1;}
    .insight{background:var(--amber-light);border:2px solid var(--amber);border-radius:var(--radius);padding:14px 18px;font-size:15px;font-weight:500;line-height:1.6;opacity:0;transition:opacity .6s;}
    .insight.show{opacity:1;}
    @media(max-width:600px){main{padding:12px 16px 24px;}.sliders{grid-template-columns:1fr;} .btns{grid-template-columns:1fr;}}
  </style>
</head>
<body>
<header>
  <div class="badge">小学 · 乘法 · 认知动作：比较</div>
  <h1>乘法数组实验室</h1>
  <p class="sub">调整行数和列数，看点阵旋转时"总数为什么不变"</p>
</header>
<main>
  <div class="sliders">
    <div class="sl-row">
      <div class="sl-label">行数（几行）</div>
      <div class="sl-val" id="rowVal">3</div>
      <input type="range" id="rowSlider" min="1" max="9" value="3">
    </div>
    <div class="sl-row">
      <div class="sl-label">列数（每行几个）</div>
      <div class="sl-val" id="colVal">4</div>
      <input type="range" id="colSlider" min="1" max="9" value="4">
    </div>
  </div>
  <div class="eq-row">
    <span class="eq-main" id="eqMain">3 × 4 = 12</span>
    <span class="eq-note" id="eqNote">（3行，每行4个）</span>
  </div>
  <canvas id="cvs"></canvas>
  <div class="btns">
    <button class="btn btn-primary" id="rotBtn" onclick="startRotate()">↻ 旋转点阵（验证交换律）</button>
    <button class="btn btn-secondary" onclick="resetView()">重置</button>
  </div>
  <div class="fb" id="fb"></div>
  <div class="insight" id="insight"></div>
</main>
<script>
// ── 0. 教学法标注 ───────────────────────────────────────
// 认知动作：比较
// V1 动态跃迁：点阵90°旋转揭示交换律，静态图无法做到
// V2 表征桥接：行列数值 + 算式 + 点阵三联动
// V3 分步揭示：旋转后才显示"交换律"结论
// V6 动作-数学一致：旋转 = 行列互换
// V7 单一认知动作：只做"比较" a×b 与 b×a
// V8 概念反馈：揭示"旋转不改变总数"这一数学不变量

const cvs=document.getElementById('cvs');
const ctx=cvs.getContext('2d');

// ── 1. 常量 ───────────────────────────────────────────
const C={blue:'#2a5c8f',blueL:'#e8f0f8',teal:'#0f6e56',tealL:'#e1f5ee',amber:'#854f0b',ink:'#1a1814',ink2:'#6b6860',ink3:'#a8a69f',border:'#e4e2da',bg:'#f7f6f2',surf:'#ffffff'};
const DOT_R=13, DOT_GAP=10;

// ── 2. 状态 ──────────────────────────────────────────
let rows=3,cols=4,rotAngle=0,animId=null,rotated=false,hasRotated=false,exploredCount=0;

// ── 3. 渲染 ──────────────────────────────────────────
function setup() {
  const r=cvs.getBoundingClientRect(),dpr=window.devicePixelRatio||1;
  cvs.width=r.width*dpr; cvs.height=300*dpr; ctx.scale(dpr,dpr); cvs.style.height='300px';
}

function drawDot(x,y,color,alpha=1) {
  ctx.save(); ctx.globalAlpha=alpha;
  ctx.fillStyle=color;
  ctx.beginPath(); ctx.arc(x,y,DOT_R,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function draw() {
  const W=cvs.getBoundingClientRect().width, H=300;
  ctx.clearRect(0,0,W,H);

  // Current display: rows × cols but rotated by rotAngle
  const stride=DOT_R*2+DOT_GAP;
  const dispR=rotated?cols:rows, dispC=rotated?rows:cols;

  const gridW=dispC*stride-DOT_GAP, gridH=dispR*stride-DOT_GAP;
  const ox=(W-gridW)/2, oy=(H-gridH)/2;

  // Draw dots with rotation interpolation
  const sin=Math.sin(rotAngle*Math.PI/2), cos=Math.cos(rotAngle*Math.PI/2);
  const cx=W/2, cy=H/2;

  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++) {
    // Natural position
    const nx=ox+c*stride+DOT_R;
    const ny=oy+r*stride+DOT_R;
    // Rotated position (cols become rows, rows become cols)
    const rox=W/2+(rows*stride-DOT_GAP)/2-(r*stride+DOT_R);
    const roy=H/2-(cols*stride-DOT_GAP)/2+(c*stride+DOT_R);

    const t=rotAngle;
    const px=nx*(1-t)+rox*t;
    const py=ny*(1-t)+roy*t;

    // Color: each row a different shade of blue
    const hue=r/rows;
    const dotColor=interpolateColor(C.blue, C.teal, hue);
    drawDot(px,py,dotColor);
  }

  // Labels
  ctx.fillStyle=C.ink2; ctx.font="13px 'Noto Sans SC',sans-serif"; ctx.textAlign='center'; ctx.textBaseline='top';
  if(rotAngle<0.5) {
    ctx.fillText(`← ${dispC} 列 →`,W/2,8);
    ctx.save(); ctx.translate(12,H/2); ctx.rotate(-Math.PI/2);
    ctx.fillText(`↑${dispR}行↓`,0,0); ctx.restore();
  }

  // Show total
  ctx.font="bold 15px 'JetBrains Mono',monospace"; ctx.fillStyle=C.blue; ctx.textAlign='right';
  ctx.fillText(`共 ${rows*cols} 个`,W-16,H-22);
}

function interpolateColor(c1,c2,t) {
  const r1=parseInt(c1.slice(1,3),16),g1=parseInt(c1.slice(3,5),16),b1=parseInt(c1.slice(5,7),16);
  const r2=parseInt(c2.slice(1,3),16),g2=parseInt(c2.slice(3,5),16),b2=parseInt(c2.slice(5,7),16);
  return `rgb(${Math.round(r1+(r2-r1)*t)},${Math.round(g1+(g2-g1)*t)},${Math.round(b1+(b2-b1)*t)})`;
}

// ── 4. 旋转动画 ──────────────────────────────────────
function startRotate() {
  if(animId) return;
  const startAngle=rotAngle, targetAngle=rotated?0:1;
  const dur=800, st=performance.now();
  function tick(now) {
    const p=Math.min(1,(now-st)/dur);
    const ease=1-Math.pow(1-p,3); // ease-out cubic
    rotAngle=startAngle+(targetAngle-startAngle)*ease;
    draw();
    if(p<1) animId=requestAnimationFrame(tick);
    else {
      animId=null; rotated=!rotated; rotAngle=targetAngle;
      if(!hasRotated) { hasRotated=true; showFeedback(); }
      else { updateFeedback(); }
      draw();
    }
  }
  animId=requestAnimationFrame(tick);
}

// ── 5. 概念反馈 ──────────────────────────────────────
function showFeedback() {
  // PEDAGOGY V8: reveals the mathematical invariant
  const r=rows,c=cols;
  const fb=document.getElementById('fb'), ins=document.getElementById('insight');
  if(rotated) {
    fb.innerHTML=`旋转后变成了 <strong>${c} 行 × ${r} 列</strong>，但总数还是 <strong>${r*c}</strong> 个。<br>原来 <strong>${r} × ${c} = ${c} × ${r} = ${r*c}</strong>！`;
  } else {
    fb.innerHTML=`转回来：<strong>${r} 行 × ${c} 列 = ${r*c}</strong>，和旋转后一样！`;
  }
  fb.classList.add('show');
  ins.innerHTML=`🔍 <strong>你发现了乘法交换律：</strong>${r}×${c} = ${c}×${r} = ${r*c}<br>无论怎么旋转点阵，点的总数永远不变。改变行列数再试试！`;
  ins.classList.add('show');
}

function updateFeedback() {
  const r=rows,c=cols;
  const fb=document.getElementById('fb');
  if(rotated) fb.innerHTML=`<strong>${c} 行 × ${r} 列 = ${r*c}</strong>（和 ${r}×${c} 一样！）`;
  else fb.innerHTML=`<strong>${r} 行 × ${c} 列 = ${r*c}</strong>（和 ${c}×${r} 一样！）`;
}

function updateEq() {
  const r=rows,c=cols;
  document.getElementById('eqMain').textContent=`${r} × ${c} = ${r*c}`;
  document.getElementById('eqNote').textContent=`（${r}行，每行${c}个）`;
}

function resetView() {
  rotAngle=0; rotated=false; hasRotated=false;
  if(animId){cancelAnimationFrame(animId);animId=null;}
  document.getElementById('fb').classList.remove('show');
  document.getElementById('insight').classList.remove('show');
  draw();
}

// ── 6. 初始化 ─────────────────────────────────────────
document.getElementById('rowSlider').addEventListener('input',e=>{
  rows=parseInt(e.target.value);
  document.getElementById('rowVal').textContent=rows;
  rotAngle=0; rotated=false; updateEq(); draw();
  exploredCount++; if(exploredCount>=3) tryShowInsight();
});
document.getElementById('colSlider').addEventListener('input',e=>{
  cols=parseInt(e.target.value);
  document.getElementById('colVal').textContent=cols;
  rotAngle=0; rotated=false; updateEq(); draw();
  exploredCount++; if(exploredCount>=3) tryShowInsight();
});

function tryShowInsight() {
  if(hasRotated) {
    const ins=document.getElementById('insight');
    ins.innerHTML=`🔍 <strong>乘法交换律：</strong>无论你怎么改变行列数，旋转点阵后总数不变。<br>这说明乘法的顺序可以调换：a × b = b × a。`;
    ins.classList.add('show');
  }
}

window.addEventListener('resize',()=>{setup();draw();});
setup(); draw(); updateEq();
</script>
</body>
</html>
