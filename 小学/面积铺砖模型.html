<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>面积铺砖模型 · 数学可视化</title>
  <meta name="grade" content="小学">
  <meta name="topic" content="面积">
  <meta name="difficulty" content="低">
  <meta name="priority" content="A">
  <meta name="cognitive" content="累积">
  <meta name="desc" content="用单位方格铺满矩形，理解面积=长×宽的几何本质">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#f7f6f2;--surface:#fff;--ink:#1a1814;--ink2:#6b6860;--ink3:#a8a69f;--border:#e4e2da;
      --blue:#2a5c8f;--blue-light:#e8f0f8;--blue-dark:#0c447c;
      --teal:#0f6e56;--teal-light:#e1f5ee;
      --amber:#854f0b;--amber-light:#faeeda;
      --radius:12px;--radius-sm:8px;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);font-family:'Noto Sans SC',sans-serif;color:var(--ink);min-height:100vh;display:flex;flex-direction:column;align-items:center;}
    header{width:100%;max-width:700px;padding:24px 24px 0;}
    .badge{font-size:12px;color:var(--ink2);background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:4px 12px;display:inline-block;margin-bottom:8px;}
    h1{font-size:22px;font-weight:700;}
    .sub{font-size:13px;color:var(--ink2);margin-top:4px;}
    main{width:100%;max-width:700px;padding:16px 24px 32px;display:flex;flex-direction:column;gap:12px;}
    .sliders{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;display:grid;grid-template-columns:1fr 1fr;gap:14px;}
    .sl-row{display:flex;flex-direction:column;gap:6px;}
    .sl-label{font-size:13px;color:var(--ink2);}
    .sl-val{font-size:24px;font-weight:700;font-family:'JetBrains Mono',monospace;}
    input[type=range]{accent-color:var(--blue);cursor:pointer;width:100%;}
    .counter{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;display:flex;align-items:center;gap:14px;}
    .count-box{text-align:center;}
    .count-num{font-size:36px;font-weight:700;font-family:'JetBrains Mono',monospace;line-height:1;}
    .count-label{font-size:12px;color:var(--ink2);margin-top:3px;}
    .eq-display{flex:1;text-align:center;}
    .eq-formula{font-size:20px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--blue);opacity:0;transition:opacity .5s;}
    .eq-formula.show{opacity:1;}
    canvas{width:100%;height:320px;display:block;border-radius:var(--radius);background:var(--surface);border:1px solid var(--border);}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
    .btn{padding:12px;border:none;border-radius:var(--radius);font-size:14px;font-family:inherit;font-weight:600;cursor:pointer;transition:all .2s;}
    .btn-primary{background:var(--blue);color:#fff;}
    .btn-primary:hover{background:var(--blue-dark);}
    .btn-secondary{background:var(--surface);color:var(--blue);border:2px solid var(--blue);}
    .btn-secondary:hover{background:var(--blue-light);}
    .fb{background:var(--teal-light);border-left:4px solid var(--teal);border-radius:var(--radius-sm);padding:12px 16px;font-size:14px;line-height:1.7;opacity:0;transition:opacity .5s;}
    .fb.show{opacity:1;}
    @media(max-width:500px){.sliders{grid-template-columns:1fr;}.btns{grid-template-columns:1fr;}}
  </style>
</head>
<body>
<header>
  <div class="badge">小学 · 面积 · 认知动作：累积</div>
  <h1>面积铺砖模型</h1>
  <p class="sub">用单位方格一格一格铺满矩形，理解面积的真正含义</p>
</header>
<main>
  <div class="sliders">
    <div class="sl-row">
      <div class="sl-label">长度（列数）</div>
      <div class="sl-val" id="colVal" style="color:var(--blue)">5</div>
      <input type="range" id="colSl" min="1" max="10" value="5">
    </div>
    <div class="sl-row">
      <div class="sl-label">宽度（行数）</div>
      <div class="sl-val" id="rowVal" style="color:var(--teal)">4</div>
      <input type="range" id="rowSl" min="1" max="8" value="4">
    </div>
  </div>
  <div class="counter">
    <div class="count-box">
      <div class="count-num" id="filledCount" style="color:var(--blue)">0</div>
      <div class="count-label">已铺方格</div>
    </div>
    <div style="width:2px;height:50px;background:var(--border)"></div>
    <div class="count-box">
      <div class="count-num" id="totalCount" style="color:var(--teal)">20</div>
      <div class="count-label">总格数</div>
    </div>
    <div class="eq-display">
      <div class="eq-formula" id="eqFormula">5 × 4 = 20 个方格</div>
    </div>
  </div>
  <canvas id="cvs"></canvas>
  <div class="btns">
    <button class="btn btn-primary" id="animBtn" onclick="startFill()">▶ 开始铺砖</button>
    <button class="btn btn-secondary" onclick="resetFill()">重置</button>
  </div>
  <div class="fb" id="fb"></div>
</main>
<script>
// ── 0. 教学法标注 ────────────────────────────────────
// 认知动作：累积
// V1 动态跃迁：逐格铺满的动画展示面积累积的过程
// V3 分步揭示：初始为空矩形，动画完成后才显示公式
// V5 操作先于符号：先看铺砖过程，再看长×宽=面积
// V6 动作-数学一致：每铺一格，计数+1，空间累积=数量累积
// V7 单一认知动作：只做"累积"
// V8 概念反馈：揭示"面积=所有单位正方形的总数"这一本质

const cvs=document.getElementById('cvs');
const ctx=cvs.getContext('2d');
const C={blue:'#2a5c8f',blueL:'#e8f0f8',teal:'#0f6e56',tealL:'#e1f5ee',amber:'#854f0b',ink:'#1a1814',ink2:'#6b6860',ink3:'#a8a69f',border:'#e4e2da',bg:'#f7f6f2',surf:'#fff'};

let cols=5,rows=4,filled=0,animId=null,fillSpeed=1;

function setup(){
  const r=cvs.getBoundingClientRect(),dpr=window.devicePixelRatio||1;
  cvs.width=r.width*dpr; cvs.height=320*dpr; ctx.scale(dpr,dpr); cvs.style.height='320px';
}

function draw(){
  const W=cvs.getBoundingClientRect().width, H=320;
  ctx.clearRect(0,0,W,H);

  const maxCellW=Math.floor((W-60)/(cols)), maxCellH=Math.floor((H-60)/(rows));
  const cellSize=Math.min(maxCellW,maxCellH,54);
  const gridW=cols*cellSize, gridH=rows*cellSize;
  const ox=(W-gridW)/2, oy=(H-gridH)/2;

  // Dimension labels
  ctx.fillStyle=C.blue; ctx.font=`bold 14px 'Noto Sans SC',sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(`← 长 ${cols} →`, ox+gridW/2, oy-18);
  ctx.save(); ctx.translate(ox-20,oy+gridH/2); ctx.rotate(-Math.PI/2);
  ctx.fillStyle=C.teal;
  ctx.fillText(`↑ 宽 ${rows} ↓`,0,0); ctx.restore();

  // Draw cells
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const idx=r*cols+c;
      const x=ox+c*cellSize, y=oy+r*cellSize;
      if(idx<filled){
        // Filled tile
        const progress=Math.min(1,(filled-idx));
        const isNew=(idx===filled-1 && filled<cols*rows);
        ctx.fillStyle=isNew?C.teal:C.blue;
        ctx.globalAlpha=isNew?0.85:0.7;
        ctx.fillRect(x+1,y+1,cellSize-2,cellSize-2);
        ctx.globalAlpha=1;
        ctx.strokeStyle='rgba(255,255,255,0.6)'; ctx.lineWidth=1;
        ctx.strokeRect(x+1,y+1,cellSize-2,cellSize-2);
        // Row-count label (rightmost tile in each row)
        if(c===cols-1 && idx<filled && r<Math.floor(filled/cols)) {
          ctx.fillStyle=C.surf; ctx.font=`bold ${Math.max(10,cellSize/3)}px 'JetBrains Mono',monospace`; ctx.textAlign='center'; ctx.textBaseline='middle';
          ctx.fillText(`${cols}`,x+cellSize/2,y+cellSize/2);
        }
      } else {
        // Empty cell
        ctx.fillStyle=C.bg;
        ctx.fillRect(x+1,y+1,cellSize-2,cellSize-2);
        ctx.strokeStyle=C.border; ctx.lineWidth=1;
        ctx.strokeRect(x+1,y+1,cellSize-2,cellSize-2);
      }
    }
  }
  // Outer border
  ctx.strokeStyle=C.ink2; ctx.lineWidth=2;
  ctx.strokeRect(ox,oy,gridW,gridH);

  // Row annotation: "row X: cols个"
  const completedRows=Math.floor(filled/cols);
  if(completedRows>0&&completedRows<=rows) {
    ctx.fillStyle=C.ink2; ctx.font=`12px 'Noto Sans SC',sans-serif`; ctx.textAlign='left'; ctx.textBaseline='middle';
    ctx.fillText(`${completedRows}行 × ${cols}列 = ${completedRows*cols}格`,ox+gridW+8,oy+completedRows*cellSize-cellSize/2);
  }

  // Progress indicator
  if(filled>0&&filled<cols*rows) {
    ctx.fillStyle=C.teal+'aa'; ctx.font=`12px 'Noto Sans SC',sans-serif`; ctx.textAlign='center'; ctx.textBaseline='top';
    ctx.fillText(`正在铺第 ${filled} 格……`,W/2,oy+gridH+10);
  }
}

function startFill(){
  if(animId) return;
  if(filled===cols*rows){resetFill();return;}
  document.getElementById('animBtn').textContent='铺砖中…';
  document.getElementById('animBtn').disabled=true;
  fillSpeed=Math.max(1,Math.floor(cols*rows/20));
  const interval=cols*rows<=20?120:cols*rows<=35?70:40;
  function tick(){
    filled=Math.min(filled+1,cols*rows);
    document.getElementById('filledCount').textContent=filled;
    draw();
    if(filled<cols*rows){
      animId=setTimeout(tick,interval);
    } else {
      animId=null;
      onFillComplete();
    }
  }
  animId=setTimeout(tick,80);
}

function onFillComplete(){
  // PEDAGOGY V5: formula appears only after fill animation
  // PEDAGOGY V8: conceptual feedback
  document.getElementById('eqFormula').textContent=`${cols} × ${rows} = ${cols*rows} 个方格`;
  document.getElementById('eqFormula').classList.add('show');
  document.getElementById('animBtn').textContent='重新铺砖';
  document.getElementById('animBtn').disabled=false;

  const fb=document.getElementById('fb');
  fb.innerHTML=`你刚刚铺了 <strong>${rows} 行，每行 ${cols} 格</strong>，共 <strong>${cols*rows} 格</strong>。<br>这就是面积的本质：<strong>能容纳多少个单位正方形</strong>。<br>所以这个矩形的面积 = 长 ${cols} × 宽 ${rows} = <strong>${cols*rows} 平方单位</strong>。`;
  fb.classList.add('show');
}

function resetFill(){
  if(animId){clearTimeout(animId);animId=null;}
  filled=0;
  document.getElementById('filledCount').textContent='0';
  document.getElementById('eqFormula').classList.remove('show');
  document.getElementById('fb').classList.remove('show');
  document.getElementById('animBtn').textContent='▶ 开始铺砖';
  document.getElementById('animBtn').disabled=false;
  draw();
}

function updateDims(){
  cols=parseInt(document.getElementById('colSl').value);
  rows=parseInt(document.getElementById('rowSl').value);
  document.getElementById('colVal').textContent=cols;
  document.getElementById('rowVal').textContent=rows;
  document.getElementById('totalCount').textContent=cols*rows;
  resetFill();
}

document.getElementById('colSl').addEventListener('input',updateDims);
document.getElementById('rowSl').addEventListener('input',updateDims);
window.addEventListener('resize',()=>{setup();draw();});
setup(); draw();
</script>
</body>
</html>
